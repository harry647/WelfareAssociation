<script>
// Mobile menu toggle - exposed globally for onclick handler
window.toggleMenu = function() {
    var menu = document.getElementById('nav-menu');
    var hamburger = document.querySelector('.hamburger-icon');
    if (menu) menu.classList.toggle('active');
    if (hamburger) hamburger.classList.toggle('active');
    console.log('Toggle menu clicked, menu:', menu, 'hamburger:', hamburger);
};

// Toggle dropdown function
window.toggleDropdown = function(element) {
    if (element) {
        element.classList.toggle('active');
    }
};

// Initialize dropdown click handlers
function initDropdowns() {
    var dropdowns = document.querySelectorAll('.dropdown');
    dropdowns.forEach(function(dropdown) {
        var dropbtn = dropdown.querySelector('.dropbtn');
        if (dropbtn) {
            // Remove any existing onclick handlers to avoid duplicates
            dropbtn.onclick = function(e) {
                // Always prevent default and toggle on mobile/touch
                if (window.innerWidth <= 900 || 'ontouchstart' in window || window.matchMedia('(max-width: 900px)').matches) {
                    e.preventDefault();
                    e.stopPropagation();
                    window.toggleDropdown(dropdown);
                }
            };
        }
    });
}

// Initialize when DOM is ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initDropdowns);
} else {
    initDropdowns();
}

// Also set up event delegation for dynamically added content
document.addEventListener('click', function(e) {
    // Toggle hamburger menu
    if (e.target.closest('.hamburger-icon')) {
        window.toggleMenu();
    }
});

// Handle dropdown clicks via event delegation
document.addEventListener('click', function(e) {
    var dropbtn = e.target.closest('.dropbtn');
    if (dropbtn) {
        var dropdown = dropbtn.closest('.dropdown');
        if (dropdown && (window.innerWidth <= 900 || 'ontouchstart' in window || window.matchMedia('(max-width: 900px)').matches)) {
            e.preventDefault();
            e.stopPropagation();
            window.toggleDropdown(dropdown);
        }
    }
});

// Close dropdowns when clicking outside
document.addEventListener('click', function(e) {
    if (window.innerWidth <= 900 || 'ontouchstart' in window || window.matchMedia('(max-width: 900px)').matches) {
        if (!e.target.closest('.dropdown')) {
            document.querySelectorAll('.dropdown.active').forEach(function(dd) {
                dd.classList.remove('active');
            });
        }
    }
});

// Debug: log when hamburger is clicked
document.addEventListener('click', function(e) {
    var hamburger = e.target.closest('.hamburger-icon');
    if (hamburger) {
        console.log('Hamburger clicked!');
    }
});
</script>
