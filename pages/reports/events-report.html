<!DOCTYPE html>
<html lang="en">

<head>
    <!-- W3 Schools HTML Includes -->
    <script src="https://www.w3schools.com/lib/w3.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Events Report - SWA events statistics">
    <meta name="keywords" content="SWA, events, report, statistics">
    <title>Events Report - Student Welfare Association | JOOUST</title>
    
    <!-- Main Styles -->
    <link rel="stylesheet" href="../../src/styles/main.css">
    <link rel="stylesheet" href="../../src/styles/original/header.css">
    <link rel="stylesheet" href="../../src/styles/pages/shared/navigation.css">
    <link rel="stylesheet" href="../../src/styles/original/footer.css">
    <!-- Report Styles -->
    <link rel="stylesheet" href="../../src/styles/pages/reports/events-report.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <!-- Shared Header -->
  <div w3-include-html="../shared/header.html"></div>

    <!-- Page Header -->
    <header class="report-header">
        <h1><i class="fas fa-calendar-alt"></i> Events Report</h1>
        <p>Event statistics and attendance overview</p>
    </header>

    <main class="report-container">
        <!-- Summary Stats -->
        <section class="report-stats">
            <div class="stat-card">
                <i class="fas fa-calendar-check"></i>
                <h3>Total Events</h3>
                <p class="stat-number">-</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-play-circle"></i>
                <h3>Upcoming</h3>
                <p class="stat-number">-</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-double"></i>
                <h3>Completed</h3>
                <p class="stat-number">-</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <h3>Total Attendees</h3>
                <p class="stat-number">-</p>
            </div>
        </section>

        <!-- Events Table -->
        <section class="report-table">
            <h2>Event List</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Event Name</th>
                        <th>Location</th>
                        <th>Attendees</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data loaded dynamically -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Shared Footer -->
  <div w3-include-html="../shared/footer.html"></div>

    <!-- W3 Schools HTML Includes Script -->
    <script>
        w3.includeHTML();
    </script>

    <script type="module" src="../../src/scripts/pages/reports/events-report.js"></script>
