<!DOCTYPE html>
<html lang="en">

<head>
    <!-- W3 Schools HTML Includes -->
    <script src="https://www.w3schools.com/lib/w3.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Loans Report - SWA loan statistics and details">
    <meta name="keywords" content="SWA, loans, report, statistics">
    <title>Loans Report - Student Welfare Association | JOOUST</title>
    
    <!-- Main Styles -->
    <link rel="stylesheet" href="../../src/styles/main.css">
    <link rel="stylesheet" href="../../src/styles/original/header.css">
    <link rel="stylesheet" href="../../src/styles/pages/shared/navigation.css">
    <link rel="stylesheet" href="../../src/styles/original/footer.css">
    <!-- Report Styles -->
    <link rel="stylesheet" href="../../src/styles/pages/reports/loans-report.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <!-- Shared Header -->
  <div w3-include-html="../shared/header.html"></div>

    <!-- Page Header -->
    <header class="report-header">
        <h1><i class="fas fa-file-contract"></i> Loans Report</h1>
        <p>Comprehensive loan statistics and details</p>
    </header>

    <main class="report-container">
        <!-- Summary Stats -->
        <section class="report-stats">
            <div class="stat-card">
                <i class="fas fa-file-invoice"></i>
                <h3>Total Applications</h3>
                <p class="stat-number">45</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <h3>Approved</h3>
                <p class="stat-number">38</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-spinner"></i>
                <h3>Pending</h3>
                <p class="stat-number">5</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-money-bill-wave"></i>
                <h3>Total Disbursed</h3>
                <p class="stat-number">Ksh 125,000</p>
            </div>
        </section>

        <!-- Loan Table -->
        <section class="report-table">
            <h2>Loan Applications</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Member</th>
                        <th>Amount</th>
                        <th>Purpose</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Mar 15, 2025</td>
                        <td>John Doe</td>
                        <td>Ksh 5,000</td>
                        <td>Fees</td>
                        <td><span class="status approved">Approved</span></td>
                    </tr>
                    <tr>
                        <td>Mar 14, 2025</td>
                        <td>Jane Smith</td>
                        <td>Ksh 3,000</td>
                        <td>Books</td>
                        <td><span class="status pending">Pending</span></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- Shared Footer -->
  <div w3-include-html="../shared/footer.html"></div>

    <!-- W3 Schools HTML Includes Script -->
    <script>
        w3.includeHTML();
    </script>

    <script type="module" src="../../src/scripts/pages/reports/loans-report.js"></script>
</body>

</html>
