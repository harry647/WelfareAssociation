<!DOCTYPE html>
<html lang="en">

<head>
    <!-- W3 Schools HTML Includes -->
    <script src="https://www.w3schools.com/lib/w3.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Export Data - SWA data export functionality">
    <meta name="keywords" content="SWA, export, data, download">
    <title>Export Data - Student Welfare Association | JOOUST</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Main Styles -->
    <link rel="stylesheet" href="/src/styles/pages/dashboard/unified-dashboard.css">
    <link rel="stylesheet" href="/src/styles/pages/reports/export-data.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar Component -->
        <div w3-include-html="/pages/dashboard/components/sidebar-admin.html"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header Component -->
            <div w3-include-html="/pages/dashboard/components/header-admin.html"></div>

            <!-- Page Content -->
            <div class="content-section active">
                <div class="page-body">
                    <div class="page-header">
                        <h1><i class="fas fa-download"></i> Export Data</h1>
                        <p>Export SWA data in various formats</p>
                    </div>

                    <!-- Export Options -->
                    <section class="export-section">
                        <h2>Select Data to Export</h2>
                        
                        <div class="export-options">
                            <div class="export-card" data-type="members">
                                <i class="fas fa-users"></i>
                                <h3>Members</h3>
                                <p>Export all member data</p>
                                <select id="membersFormat" class="format-select">
                                    <option value="json">JSON</option>
                                    <option value="csv">CSV</option>
                                    <option value="excel">Excel</option>
                                </select>
                                <button class="btn btn-primary export-btn" data-type="members">
                                    <i class="fas fa-download"></i> Export
                                </button>
                            </div>
                            
                            <div class="export-card" data-type="contributions">
                                <i class="fas fa-donate"></i>
                                <h3>Contributions</h3>
                                <p>Export all contribution records</p>
                                <select id="contributionsFormat" class="format-select">
                                    <option value="json">JSON</option>
                                    <option value="csv">CSV</option>
                                    <option value="excel">Excel</option>
                                </select>
                                <button class="btn btn-primary export-btn" data-type="contributions">
                                    <i class="fas fa-download"></i> Export
                                </button>
                            </div>
                            
                            <div class="export-card" data-type="loans">
                                <i class="fas fa-file-contract"></i>
                                <h3>Loans</h3>
                                <p>Export all loan records</p>
                                <select id="loansFormat" class="format-select">
                                    <option value="json">JSON</option>
                                    <option value="csv">CSV</option>
                                    <option value="excel">Excel</option>
                                </select>
                                <button class="btn btn-primary export-btn" data-type="loans">
                                    <i class="fas fa-download"></i> Export
                                </button>
                            </div>
                            
                            <div class="export-card" data-type="events">
                                <i class="fas fa-calendar-alt"></i>
                                <h3>Events</h3>
                                <p>Export all event records</p>
                                <select id="eventsFormat" class="format-select">
                                    <option value="json">JSON</option>
                                    <option value="csv">CSV</option>
                                    <option value="excel">Excel</option>
                                </select>
                                <button class="btn btn-primary export-btn" data-type="events">
                                    <i class="fas fa-download"></i> Export
                                </button>
                            </div>
                        </div>
                    </section>

                    <!-- Export History -->
                    <section class="export-history">
                        <h2>Recent Exports</h2>
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Format</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="exportHistoryBody">
                                <tr>
                                    <td colspan="5" style="text-align: center; padding: 20px;">
                                        No export history yet.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Component -->
    <div w3-include-html="/pages/dashboard/components/footer-dashboard.html"></div>

    <!-- W3 Schools HTML Includes Script -->
    <script>
        w3.includeHTML();
    </script>

    <script src="/src/scripts/pages/dashboard/header-admin.js"></script>
    
    <script type="module" src="/src/scripts/pages/reports/export-data.js"></script>
