<!-- Shared Header Component -->
<!-- Include this in pages/dashboard/shared/ using: <div w3-include-html="../components/header-shared.html"></div> -->
<!-- Then call w3.includeHTML() after including the script -->

<header class="admin-header">
  <div class="header-left">
    <!-- Back Button -->
    <a href="javascript:history.back()" class="back-btn" title="Go Back">
      <i class="fas fa-arrow-left"></i>
    </a>
    <button class="sidebar-toggle" id="sidebarToggle">
      <i class="fas fa-bars"></i>
    </button>
    <div class="header-title">
      <h1 id="pageTitle">Dashboard</h1>
      <p id="pageSubtitle">Welcome to SWA</p>
    </div>
  </div>

  <div class="header-right">
    <!-- Notifications -->
    <div class="notification-bell" id="notificationBell">
      <i class="fas fa-bell"></i>
      <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
    </div>

    <!-- User Profile Dropdown -->
    <div class="user-profile" id="userProfile">
      <div class="user-avatar" id="headerUserAvatar">U</div>
      <div class="user-info">
        <span class="user-name" id="headerUserName">User</span>
        <span class="user-role" id="headerUserRole">Member</span>
      </div>
      <i class="fas fa-chevron-down"></i>
    </div>

    <!-- Logout Button -->
    <button class="logout-btn" id="headerLogoutBtn" title="Logout">
      <i class="fas fa-sign-out-alt"></i>
    </button>
  </div>
</header>
