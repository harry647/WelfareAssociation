<!-- Admin Header Component -->
<!-- Include this in all admin dashboard pages using: <div w3-include-html="../components/header-admin.html"></div> -->
<!-- Then call w3.includeHTML() after including the script -->

<header class="admin-header">
  <div class="header-left">
    <button class="sidebar-toggle" id="sidebarToggle">
      <i class="fas fa-bars"></i>
    </button>
    <div class="header-title">
      <h1 id="pageTitle">Admin Dashboard</h1>
      <p id="pageSubtitle">Welcome back, Administrator</p>
    </div>
  </div>

  <div class="header-right">
    <!-- Notifications -->
    <div class="notification-bell" id="notificationBell">
      <i class="fas fa-bell"></i>
      <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
    </div>

    <!-- Quick Actions -->
    <button class="header-action-btn" id="quickActionsBtn" title="Quick Actions">
      <i class="fas fa-plus-circle"></i>
    </button>

    <!-- User Profile Dropdown -->
    <div class="user-profile" id="userProfile">
      <div class="user-avatar" id="headerUserAvatar">A</div>
      <div class="user-info">
        <span class="user-name" id="headerUserName">Admin User</span>
        <span class="user-role" id="headerUserRole">Administrator</span>
      </div>
      <i class="fas fa-chevron-down"></i>
    </div>

    <!-- Logout Button -->
    <button class="logout-btn" id="headerLogoutBtn" title="Logout">
      <i class="fas fa-sign-out-alt"></i>
    </button>
  </div>
</header>
