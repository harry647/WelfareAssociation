<!-- Member Header Component -->
<!-- Include this in all member dashboard pages using: <div w3-include-html="../components/header-member.html"></div> -->
<!-- Then call w3.includeHTML() after including the script -->

<header class="member-header">
  <div class="member-header-left">
    <!-- Back Button -->
    <a href="javascript:history.back()" class="back-btn" title="Go Back">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div class="member-avatar" id="memberAvatar">M</div>
    <div>
      <h1 id="welcomeMessage"><i class="fas fa-user-circle"></i> Welcome, Member</h1>
      <p>Manage your SWA account, contributions, and loans</p>
    </div>
  </div>

  <div class="header-right">
    <!-- Notifications -->
    <div class="notification-bell" id="notificationBell">
      <i class="fas fa-bell"></i>
      <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
    </div>

    <!-- Profile Link -->
    <a href="/pages/auth/profile.html" class="profile-link" title="View Profile">
      <i class="fas fa-user-circle"></i>
    </a>

    <!-- Logout Button -->
    <button type="button" class="logout-btn" id="memberLogoutBtn">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>
</header>

<!-- Fine Alert (shown when member has unpaid fines) -->
<div id="fineAlert" class="alert alert-warning" style="display: none;">
  <i class="fas fa-exclamation-triangle"></i>
  <span id="fineAlertText">You have unpaid fines of Ksh 0</span>
  <a href="#fines-section" class="alert-link">View Details</a>
</div>
