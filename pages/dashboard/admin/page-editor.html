<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Editor - <%= pageName %></title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/admin-dashboard.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      overflow: hidden;
    }
    
    .editor-toolbar {
      background: #2c3e50;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 56px;
    }
    
    .editor-toolbar h1 {
      font-size: 18px;
      font-weight: 500;
    }
    
    .toolbar-actions {
      display: flex;
      gap: 10px;
    }
    
    .toolbar-btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    
    .toolbar-btn:hover {
      background: #2980b9;
    }
    
    .toolbar-btn.save {
      background: #27ae60;
    }
    
    .toolbar-btn.save:hover {
      background: #219a52;
    }
    
    .toolbar-btn.refresh {
      background: #e67e22;
    }
    
    .toolbar-btn.refresh:hover {
      background: #d35400;
    }
    
    .toolbar-btn.image {
      background: #9b59b6;
    }
    
    .toolbar-btn.image:hover {
      background: #8e44ad;
    }
    
    .toolbar-btn.url {
      background: #1abc9c;
    }
    
    .toolbar-btn.url:hover {
      background: #16a085;
    }
    
    .editor-container {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 36px;
      display: flex;
      flex-direction: column;
    }
    
    .editor-panes {
      display: flex;
      flex: 1;
      gap: 0;
      min-height: 0;
    }
    
    .code-pane, .preview-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 200px;
      min-height: 100px;
    }
    
    .code-pane {
      background: white;
      width: 50%;
      position: relative;
    }
    
    .editor-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }
    
    .preview-pane {
      background: white;
      width: 50%;
    }
    
    /* Resize handle between panes (horizontal) */
    .resize-handle-vertical {
      width: 6px;
      background: #ecf0f1;
      cursor: col-resize;
      position: relative;
      flex-shrink: 0;
      transition: background 0.2s;
      z-index: 10;
    }
    
    .resize-handle-vertical:hover,
    .resize-handle-vertical.active {
      background: #3498db;
    }
    
    .resize-handle-vertical::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 40px;
      background: #bdc3c7;
      border-radius: 2px;
    }
    
    .resize-handle-vertical:hover::after,
    .resize-handle-vertical.active::after {
      background: white;
    }
    
    /* Resize handle at bottom of panes (vertical) */
    .resize-handle-horizontal {
      height: 6px;
      background: #ecf0f1;
      cursor: row-resize;
      position: relative;
      flex-shrink: 0;
      transition: background 0.2s;
      z-index: 10;
    }
    
    .resize-handle-horizontal:hover,
    .resize-handle-horizontal.active {
      background: #3498db;
    }
    
    .resize-handle-horizontal::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: 3px;
      width: 40px;
      background: #bdc3c7;
      border-radius: 2px;
    }
    
    .resize-handle-horizontal:hover::after,
    .resize-handle-horizontal.active::after {
      background: white;
    }
    
    .pane-header {
      background: #34495e;
      color: white;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      flex-shrink: 0;
      height: 36px;
    }
    
    .pane-btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }
    
    .pane-btn:hover {
      background: #2980b9;
    }
    
    .editor-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }
    
    .html-editor {
      flex: 1;
      border: none;
      padding: 10px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: none;
      outline: none;
      background: #1e1e1e;
      color: #d4d4d4;
      min-height: 0;
    }
    
    .preview-pane .editor-wrapper {
      flex-direction: column;
    }
    
    .preview-pane iframe {
      flex: 1;
      background: white;
      overflow: hidden;
      border: none;
      min-height: 0;
    }
    
    .status-bar {
      background: #34495e;
      color: #ecf0f1;
      padding: 8px 20px;
      font-size: 13px;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #95a5a6;
    }
    
    .status-dot.saved {
      background: #2ecc71;
    }
    
    .status-dot.modified {
      background: #f39c12;
    }
    
    .status-dot.saving {
      background: #3498db;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Hide resize handles on small screens */
    @media (max-width: 768px) {
      .resize-handle-vertical,
      .resize-handle-horizontal {
        display: none;
      }
      
      .editor-panes {
        flex-direction: column;
      }
      
      .code-pane, .preview-pane {
        width: 100% !important;
        height: 50% !important;
      }
    }
    
    /* Image upload drop zone */
    .drop-zone-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(52, 152, 219, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 100;
      pointer-events: none;
    }
    
    .drop-zone-overlay.active {
      display: flex;
    }
    
    .drop-zone-overlay i {
      font-size: 48px;
      color: white;
      margin-bottom: 16px;
    }
    
    .drop-zone-overlay p {
      color: white;
      font-size: 18px;
      font-weight: 500;
    }
    
    /* Image insert modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal-content {
      background: white;
      padding: 24px;
      border-radius: 8px;
      width: 400px;
      max-width: 90%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }
    
    .modal-content h3 {
      margin-bottom: 16px;
      color: #2c3e50;
    }
    
    .modal-content input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    
    .modal-content input:focus {
      outline: none;
      border-color: #3498db;
    }
    
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    
    .modal-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    
    .modal-btn.cancel {
      background: #95a5a6;
      color: white;
    }
    
    .modal-btn.cancel:hover {
      background: #7f8c8d;
    }
    
    .modal-btn.insert {
      background: #27ae60;
      color: white;
    }
    
    .modal-btn.insert:hover {
      background: #219a52;
    }
    
    /* Loading state for upload */
    .uploading {
      opacity: 0.7;
      pointer-events: none;
    }
    
    .upload-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ffffff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="editor-toolbar">
    <h1><i class="fas fa-edit"></i> Editing: <span id="pageName"><%= pageName %></span></h1>
    <div class="toolbar-actions">
      <button class="toolbar-btn image" onclick="openImageUpload()">
        <i class="fas fa-image"></i> Insert Image
      </button>
      <button class="toolbar-btn url" onclick="openImageUrlDialog()">
        <i class="fas fa-link"></i> Image URL
      </button>
      <button class="toolbar-btn refresh" onclick="refreshPreview()">
        <i class="fas fa-sync"></i> Refresh
      </button>
      <button class="toolbar-btn save" onclick="savePage()">
        <i class="fas fa-save"></i> Save Changes
      </button>
    </div>
  </div>
  
  <div class="editor-container">
    <div class="editor-panes">
      <div class="code-pane">
        <div class="pane-header">
          <span>HTML Source</span>
          <button class="pane-btn" onclick="formatCode()"><i class="fas fa-align-left"></i> Format</button>
        </div>
        <div class="editor-wrapper">
          <div class="drop-zone-overlay" id="dropZoneOverlay">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Drop image here to upload</p>
          </div>
          <textarea id="htmlEditor" class="html-editor" spellcheck="false"></textarea>
        </div>
        <div class="resize-handle-horizontal" id="codeResizeHandle" title="Drag to resize vertically"></div>
      </div>
      <div class="resize-handle-vertical" id="paneResizeHandle" title="Drag to resize horizontally"></div>
      <div class="preview-pane">
        <div class="pane-header">
          <span>Preview</span>
          <button class="pane-btn" onclick="refreshPreview()"><i class="fas fa-sync"></i> Refresh</button>
        </div>
        <div class="editor-wrapper">
          <iframe id="previewFrame"></iframe>
        </div>
        <div class="resize-handle-horizontal" id="previewResizeHandle" title="Drag to resize vertically"></div>
      </div>
    </div>
  </div>
  
  <div class="status-bar">
    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Ready</span>
    </div>
    <div>
      <span id="lastSaved">Last saved: Never</span>
    </div>
  </div>
  
  <!-- Hidden file input for image upload -->
  <input type="file" id="imageUpload" accept="image/*" style="display: none;">
  
  <!-- Image URL Modal -->
  <div class="modal-overlay" id="imageUrlModal">
    <div class="modal-content">
      <h3><i class="fas fa-link"></i> Insert Image URL</h3>
      <input type="url" id="imageUrlInput" placeholder="https://example.com/image.jpg">
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeImageUrlDialog()">Cancel</button>
        <button class="modal-btn insert" onclick="insertImageUrl()">Insert</button>
      </div>
    </div>
  </div>

  <script>
    const pagePath = '<%= pagePath %>';
    let hasUnsavedChanges = false;
    let originalContent = '';
    
    // Load original content into textarea
    async function loadOriginalContent() {
      try {
        updateStatus('Loading...', 'saving');
        const token = localStorage.getItem('swa_auth_token') || sessionStorage.getItem('swa_auth_token');
        const response = await fetch(`/api/pages/content/${pagePath}`, {
          headers: {
            'Authorization': token ? `Bearer ${token}` : ''
          }
        });
        const data = await response.json();
        if (data.success) {
          originalContent = data.data.content;
          document.getElementById('htmlEditor').value = originalContent;
          updatePreview();
          updateStatus('Ready', 'saved');
        } else {
          updateStatus('Error: ' + data.message, 'modified');
        }
      } catch (error) {
        console.error('Error loading content:', error);
        updateStatus('Error loading content', 'modified');
      }
    }
    
    function updatePreview() {
      const content = document.getElementById('htmlEditor').value;
      const frame = document.getElementById('previewFrame');
      const doc = frame.contentDocument || frame.contentWindow.document;
      doc.open();
      // Inject base tag to fix relative paths resolution
      doc.write('<base href="/">');
      doc.write(content);
      doc.close();
    }
    
    function formatCode() {
      const editor = document.getElementById('htmlEditor');
      // Simple HTML formatting - add newlines after closing tags
      let formatted = editor.value
        .replace(/>\s+</g, '><')
        .replace(/(\n\s*)+/g, '\n');
      editor.value = formatted;
    }
    
    function refreshPreview() {
      updatePreview();
      updateStatus('Preview refreshed', 'saved');
    }
    
    async function savePage() {
      updateStatus('Saving...', 'saving');
      
      try {
        const token = localStorage.getItem('swa_auth_token') || sessionStorage.getItem('swa_auth_token');
        const content = document.getElementById('htmlEditor').value;
        
        const response = await fetch(`/api/pages/content/${pagePath}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': token ? `Bearer ${token}` : ''
          },
          body: JSON.stringify({ content: content, createBackup: true })
        });
        
        const data = await response.json();
        if (data.success) {
          originalContent = content;
          hasUnsavedChanges = false;
          updateStatus('Saved successfully!', 'saved');
          document.getElementById('lastSaved').textContent = 'Last saved: ' + new Date().toLocaleTimeString();
        } else {
          updateStatus('Error: ' + data.message, 'modified');
        }
      } catch (error) {
        updateStatus('Error: ' + error.message, 'modified');
      }
    }
    
    function updateStatus(text, state) {
      document.getElementById('statusText').textContent = text;
      const dot = document.getElementById('statusDot');
      dot.className = 'status-dot ' + state;
    }
    
    // Track changes in the textarea
    document.getElementById('htmlEditor').addEventListener('input', function() {
      hasUnsavedChanges = true;
      updateStatus('Modified', 'modified');
      // Debounce preview update
      clearTimeout(window.previewTimeout);
      window.previewTimeout = setTimeout(updatePreview, 500);
    });
    
    // Warn before leaving
    window.addEventListener('beforeunload', function(e) {
      if (hasUnsavedChanges) {
        e.preventDefault();
        e.returnValue = 'You have unsaved changes. Are you sure you want to leave?';
      }
    });
    
    // Initialize
    loadOriginalContent();
    
    // === Image Upload Functionality ===
    
    const imageUpload = document.getElementById('imageUpload');
    const dropZoneOverlay = document.getElementById('dropZoneOverlay');
    const htmlEditor = document.getElementById('htmlEditor');
    
    // Open file picker for image upload
    function openImageUpload() {
      imageUpload.click();
    }
    
    // Handle file selection
    imageUpload.addEventListener('change', function(e) {
      if (e.target.files && e.target.files[0]) {
        uploadImage(e.target.files[0]);
      }
    });
    
    // Drag and drop handling
    htmlEditor.addEventListener('dragover', function(e) {
      e.preventDefault();
      dropZoneOverlay.classList.add('active');
    });
    
    htmlEditor.addEventListener('dragleave', function(e) {
      e.preventDefault();
      dropZoneOverlay.classList.remove('active');
    });
    
    htmlEditor.addEventListener('drop', function(e) {
      e.preventDefault();
      dropZoneOverlay.classList.remove('active');
      
      const files = e.dataTransfer.files;
      if (files.length > 0 && files[0].type.startsWith('image/')) {
        uploadImage(files[0]);
      }
    });
    
    // Upload image to server
    async function uploadImage(file) {
      updateStatus('Uploading image...', 'saving');
      
      const formData = new FormData();
      formData.append('image', file);
      
      try {
        const token = localStorage.getItem('swa_auth_token') || sessionStorage.getItem('swa_auth_token');
        
        const response = await fetch('/api/upload/image', {
          method: 'POST',
          headers: {
            'Authorization': token ? `Bearer ${token}` : ''
          },
          body: formData
        });
        
        const data = await response.json();
        
        if (data.success) {
          insertImageTag(data.data.url);
          updateStatus('Image uploaded!', 'saved');
        } else {
          updateStatus('Upload failed: ' + data.message, 'modified');
          alert('Failed to upload image: ' + data.message);
        }
      } catch (error) {
        console.error('Upload error:', error);
        updateStatus('Upload error', 'modified');
        alert('Error uploading image: ' + error.message);
      }
    }
    
    // Insert image tag at cursor position
    function insertImageTag(url) {
      const imgTag = `<img src="${url}" alt="Image" style="max-width: 100%; height: auto;">`;
      insertTextAtCursor(imgTag);
    }
    
    // Insert text at current cursor position in textarea
    function insertTextAtCursor(text) {
      const editor = document.getElementById('htmlEditor');
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const before = editor.value.substring(0, start);
      const after = editor.value.substring(end);
      
      editor.value = before + text + after;
      editor.selectionStart = editor.selectionEnd = start + text.length;
      editor.focus();
      
      // Trigger input event to update status
      editor.dispatchEvent(new Event('input', { bubbles: true }));
    }
    
    // Open image URL dialog
    function openImageUrlDialog() {
      document.getElementById('imageUrlModal').classList.add('active');
      document.getElementById('imageUrlInput').focus();
    }
    
    // Close image URL dialog
    function closeImageUrlDialog() {
      document.getElementById('imageUrlModal').classList.remove('active');
      document.getElementById('imageUrlInput').value = '';
    }
    
    // Insert image URL
    function insertImageUrl() {
      const url = document.getElementById('imageUrlInput').value.trim();
      
      if (!url) {
        alert('Please enter an image URL');
        return;
      }
      
      if (!isValidUrl(url)) {
        alert('Please enter a valid URL');
        return;
      }
      
      insertImageTag(url);
      closeImageUrlDialog();
    }
    
    // Validate URL
    function isValidUrl(string) {
      try {
        new URL(string);
        return true;
      } catch (_) {
        return false;
      }
    }
    
    // Close modal on escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeImageUrlDialog();
      }
    });
    
    // Close modal when clicking outside
    document.getElementById('imageUrlModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeImageUrlDialog();
      }
    });
    
    // === Resizable Panes Functionality ===
    
    // Vertical resize (between code and preview panes)
    const paneResizeHandle = document.getElementById('paneResizeHandle');
    const codePane = document.querySelector('.code-pane');
    const previewPane = document.querySelector('.preview-pane');
    
    let isResizingVertical = false;
    let startX, startCodeWidth, startPreviewWidth;
    
    paneResizeHandle.addEventListener('mousedown', function(e) {
      isResizingVertical = true;
      startX = e.clientX;
      const containerWidth = document.querySelector('.editor-panes').offsetWidth;
      startCodeWidth = codePane.offsetWidth;
      startPreviewWidth = previewPane.offsetWidth;
      paneResizeHandle.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });
    
    // Horizontal resize (bottom of code pane)
    const codeResizeHandle = document.getElementById('codeResizeHandle');
    const codeWrapper = codePane.querySelector('.editor-wrapper');
    
    let isResizingCodeHorizontal = false;
    let startYCode, startCodeHeight;
    
    codeResizeHandle.addEventListener('mousedown', function(e) {
      isResizingCodeHorizontal = true;
      startYCode = e.clientY;
      startCodeHeight = codePane.offsetHeight;
      codeResizeHandle.classList.add('active');
      document.body.style.cursor = 'row-resize';
      document.body.style.userSelect = 'none';
    });
    
    // Horizontal resize (bottom of preview pane)
    const previewResizeHandle = document.getElementById('previewResizeHandle');
    const previewWrapper = previewPane.querySelector('.editor-wrapper');
    
    let isResizingPreviewHorizontal = false;
    let startYPreview, startPreviewHeight;
    
    previewResizeHandle.addEventListener('mousedown', function(e) {
      isResizingPreviewHorizontal = true;
      startYPreview = e.clientY;
      startPreviewHeight = previewPane.offsetHeight;
      previewResizeHandle.classList.add('active');
      document.body.style.cursor = 'row-resize';
      document.body.style.userSelect = 'none';
    });
    
    document.addEventListener('mousemove', function(e) {
      // Vertical resize between panes
      if (isResizingVertical) {
        const dx = e.clientX - startX;
        const containerWidth = document.querySelector('.editor-panes').offsetWidth;
        const minWidth = 200;
        const maxWidth = containerWidth - minWidth - 6; // 6px for resize handle
        
        let newCodeWidth = startCodeWidth + dx;
        let newPreviewWidth = startPreviewWidth - dx;
        
        // Enforce min/max constraints
        if (newCodeWidth < minWidth) {
          newCodeWidth = minWidth;
          newPreviewWidth = containerWidth - minWidth - 6;
        } else if (newPreviewWidth < minWidth) {
          newPreviewWidth = minWidth;
          newCodeWidth = containerWidth - minWidth - 6;
        }
        
        codePane.style.width = newCodeWidth + 'px';
        previewPane.style.width = newPreviewWidth + 'px';
      }
      
      // Horizontal resize for code pane
      if (isResizingCodeHorizontal) {
        const dy = e.clientY - startYCode;
        const minHeight = 100;
        const maxHeight = codePane.parentElement.offsetHeight - minHeight - 6;
        
        let newHeight = startCodeHeight + dy;
        if (newHeight < minHeight) newHeight = minHeight;
        if (newHeight > maxHeight) newHeight = maxHeight;
        
        codePane.style.height = newHeight + 'px';
        codeWrapper.style.height = 'calc(100% - ' + newHeight + 'px + ' + codePane.offsetHeight + 'px)';
        
        // Adjust preview pane to fill remaining space
        const containerHeight = document.querySelector('.editor-panes').offsetHeight;
        const previewNewHeight = containerHeight - newHeight - 6; // 6px for handle
        previewPane.style.height = previewNewHeight + 'px';
        previewWrapper.style.height = (previewNewHeight - previewPane.querySelector('.pane-header').offsetHeight - 6) + 'px';
      }
      
      // Horizontal resize for preview pane
      if (isResizingPreviewHorizontal) {
        const dy = e.clientY - startYPreview;
        const minHeight = 100;
        const maxHeight = previewPane.parentElement.offsetHeight - minHeight - 6;
        
        let newHeight = startPreviewHeight + dy;
        if (newHeight < minHeight) newHeight = minHeight;
        if (newHeight > maxHeight) newHeight = maxHeight;
        
        previewPane.style.height = newHeight + 'px';
        previewWrapper.style.height = (newHeight - previewPane.querySelector('.pane-header').offsetHeight - 6) + 'px';
        
        // Adjust code pane to fill remaining space
        const containerHeight = document.querySelector('.editor-panes').offsetHeight;
        const codeNewHeight = containerHeight - newHeight - 6;
        codePane.style.height = codeNewHeight + 'px';
        codeWrapper.style.height = (codeNewHeight - codePane.querySelector('.pane-header').offsetHeight - 6) + 'px';
      }
    });
    
    document.addEventListener('mouseup', function() {
      isResizingVertical = false;
      isResizingCodeHorizontal = false;
      isResizingPreviewHorizontal = false;
      paneResizeHandle.classList.remove('active');
      codeResizeHandle.classList.remove('active');
      previewResizeHandle.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });
  </script>
</body>
</html>
