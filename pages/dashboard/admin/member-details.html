<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Member Details - SWA Admin Panel">
  <title>Member Details - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/members.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/admin-dashboard.css">
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar Component -->
  <div w3-include-html="../components/sidebar-admin.html"></div>

  <!-- Main Content -->
  <div class="main" id="mainContent">

    <!-- Header Component -->
    <div w3-include-html="../components/header-admin.html"></div>
        <div class="admin-details">
          <h3>Vincent Otieno</h3>
          <p>Administrator</p>
          <span class="admin-role">Chairman, SWA</span>
        </div>
      </div>
      <button class="logout-btn-header"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <!-- Page Content -->
    <div class="content-section active">
      <div class="page-body">

        <div class="page-header">
          <h1><i class="fas fa-user"></i> Member Details</h1>
          <p>View member information and profile</p>
        </div>

        <!-- Back Button -->
        <div class="back-link">
          <a href="../shared/members.html" class="btn"><i class="fas fa-arrow-left"></i> Back to Members</a>
        </div>

        <!-- Member Details -->
        <section class="data-section" id="memberDetails">
          <div class="loading">Loading member details...</div>
        </section>

        <!-- Member Actions -->
        <section class="quick-actions">
          <h2><i class="fas fa-bolt"></i> Actions</h2>
          <div class="action-buttons">
            <a href="#" id="editBtn" class="action-btn"><i class="fas fa-edit"></i> Edit Member</a>
            <a href="#" id="deleteBtn" class="action-btn"><i class="fas fa-trash"></i> Delete Member</a>
            <a href="#" id="contributionsBtn" class="action-btn"><i class="fas fa-money-bill-wave"></i> View Contributions</a>
          </div>
        </section>

      </div>
    </div>

  </div>

  <!-- W3.js component loader -->
  <script>
    w3.includeHTML();
  </script>
  
  <script type="module" src="../../../src/scripts/pages/dashboard/member-details.js"></script>
</body>
</html>
