<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SWA Member Details - Admin Panel">
  <title>Member Details - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/unified-dashboard.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar Component -->
    <div w3-include-html="../components/sidebar-admin.html"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header Component -->
      <div w3-include-html="../components/header-admin.html"></div>

      <!-- Page Content -->
      <div class="content-section active">
        <div class="page-body">
          <div class="page-header">
            <h1><i class="fas fa-user"></i> Member Details</h1>
            <p>View detailed member information</p>
          </div>
          
          <div class="section-placeholder">
            <i class="fas fa-user"></i>
            <h2>Member Details</h2>
            <p>This section is under construction.</p>
          </div>
        </div>
      </div>
    </div><!-- /main-content -->
  </div><!-- /dashboard-container -->

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-dashboard.html"></div>

  <script>w3.includeHTML();</script>

  <script>
    // Initialize sidebar functionality after components are loaded
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        initializeSidebar();
        initializeHeader();
      }, 100);
    });

    function initializeSidebar() {
      // Sidebar toggle
      const sidebarToggle = document.getElementById('sidebarToggle');
      const sidebar = document.getElementById('sidebar');
      const sidebarOverlay = document.getElementById('sidebarOverlay');
      
      if (sidebarToggle) {
        sidebarToggle.addEventListener('click', function() {
          if (sidebar) sidebar.classList.toggle('active');
          if (sidebarOverlay) sidebarOverlay.classList.toggle('active');
        });
      }

      if (sidebarOverlay) {
        sidebarOverlay.addEventListener('click', function() {
          if (sidebar) sidebar.classList.remove('active');
          this.classList.remove('active');
        });
      }
    }

    function initializeHeader() {
      // Set page title dynamically
      const pageTitle = document.getElementById('pageTitle');
      const pageSubtitle = document.getElementById('pageSubtitle');
      
      if (pageTitle) pageTitle.textContent = 'Member Details';
      if (pageSubtitle) pageSubtitle.textContent = 'View detailed member information';

      // Logout functionality
      const logoutBtn = document.getElementById('headerLogoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', function() {
          localStorage.removeItem('swa_auth_token');
          sessionStorage.removeItem('swa_auth_token');
          localStorage.removeItem('swa_user');
          sessionStorage.removeItem('swa_user');
          window.location.replace('../../../pages/auth/login-page.html');
        });
      }
    }
  </script>
</body>
</html>
