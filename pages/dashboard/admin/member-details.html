<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SWA Member Details - Admin Panel">
  <title>Member Details - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/unified-dashboard.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/members.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar Component -->
    <div w3-include-html="../components/sidebar-admin.html"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header Component -->
      <div w3-include-html="../components/header-admin.html"></div>

      <!-- Page Content -->
      <div class="content-section active">
        <div class="page-body">
          <div class="page-header">
            <h1><i class="fas fa-user"></i> Member Details</h1>
            <p>View detailed member information</p>
          </div>
          
          <!-- Member Details Container -->
          <div class="member-details-container">
            <!-- Action Buttons -->
            <div class="action-buttons">
              <button id="editBtn" class="btn btn-primary">
                <i class="fas fa-edit"></i> Edit Member
              </button>
              <button id="contributionsBtn" class="btn btn-secondary">
                <i class="fas fa-coins"></i> View Contributions
              </button>
              <button id="deleteBtn" class="btn btn-danger">
                <i class="fas fa-trash"></i> Delete Member
              </button>
              <button class="btn btn-outline" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i> Back
              </button>
            </div>

            <!-- Member Details Content -->
            <div id="memberDetails" class="member-details-content">
              <div class="loading-indicator">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading member details...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div><!-- /main-content -->
  </div><!-- /dashboard-container -->

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-dashboard.html"></div>

  <script>w3.includeHTML();</script>

  <script type="module" src="../../../src/scripts/pages/dashboard/member-details.js"></script>
</body>
</html>
