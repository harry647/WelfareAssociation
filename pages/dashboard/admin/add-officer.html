<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SWA Add Officer - Admin Panel">
  <title>Add Officer - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/unified-dashboard.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/add-officer.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar Component -->
    <div w3-include-html="../components/sidebar-admin.html"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header Component -->
      <div w3-include-html="../components/header-admin.html"></div>

      <!-- Page Content -->
      <div class="content-section active">
        <div class="page-body">
          <div class="page-header">
            <h1><i class="fas fa-user-plus"></i> Add Officer</h1>
            <p>Add new executive officers to SWA</p>
          </div>
          
          <!-- Add Officer Form -->
          <div class="form-container">
            <form id="addOfficerForm" class="form-grid">
              <!-- Personal Information -->
              <div class="form-section">
                <h3><i class="fas fa-user"></i> Personal Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="firstName">First Name *</label>
                    <input type="text" id="firstName" name="firstName" required placeholder="Enter first name...">
                  </div>
                  <div class="form-group">
                    <label for="lastName">Last Name *</label>
                    <input type="text" id="lastName" name="lastName" required placeholder="Enter last name...">
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="Enter email address...">
                  </div>
                  <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="Enter phone number...">
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="studentId">Student ID *</label>
                    <input type="text" id="studentId" name="studentId" required placeholder="Enter student ID...">
                  </div>
                  <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender">
                      <option value="">Select gender...</option>
                      <option value="male">Male</option>
                      <option value="female">Female</option>
                      <option value="other">Other</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Position Information -->
              <div class="form-section">
                <h3><i class="fas fa-user-tie"></i> Position Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="position">Position *</label>
                    <select id="position" name="position" required>
                      <option value="">Select position...</option>
                      <option value="chairman">Chairman</option>
                      <option value="vice-chairman">Vice Chairman</option>
                      <option value="secretary">Secretary</option>
                      <option value="treasurer">Treasurer</option>
                      <option value="pro">Public Relations Officer</option>
                      <option value="committee-head">Committee Head</option>
                      <option value="member">Executive Member</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="department">Department/Committee</label>
                    <select id="department" name="department">
                      <option value="">Select department...</option>
                      <option value="finance">Finance Committee</option>
                      <option value="events">Events Committee</option>
                      <option value="welfare">Welfare Committee</option>
                      <option value="academic">Academic Affairs</option>
                      <option value="sports">Sports & Recreation</option>
                      <option value="communications">Communications</option>
                    </select>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="startDate">Start Date *</label>
                    <input type="date" id="startDate" name="startDate" required>
                  </div>
                  <div class="form-group">
                    <label for="endDate">End Date</label>
                    <input type="date" id="endDate" name="endDate">
                    <small>Leave empty for ongoing position</small>
                  </div>
                </div>
              </div>

              <!-- Academic Information -->
              <div class="form-section">
                <h3><i class="fas fa-graduation-cap"></i> Academic Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="course">Course of Study</label>
                    <input type="text" id="course" name="course" placeholder="Enter course of study...">
                  </div>
                  <div class="form-group">
                    <label for="yearOfStudy">Year of Study</label>
                    <select id="yearOfStudy" name="yearOfStudy">
                      <option value="">Select year...</option>
                      <option value="1">1st Year</option>
                      <option value="2">2nd Year</option>
                      <option value="3">3rd Year</option>
                      <option value="4">4th Year</option>
                      <option value="5">5th Year</option>
                      <option value="6">6th Year</option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                  <label for="institution">Institution</label>
                  <input type="text" id="institution" name="institution" placeholder="Jaramogi Oginga Odinga University of Science and Technology">
                </div>
              </div>

              <!-- Emergency Contact -->
              <div class="form-section">
                <h3><i class="fas fa-phone-alt"></i> Emergency Contact</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="emergencyName">Emergency Contact Name</label>
                    <input type="text" id="emergencyName" name="emergencyName" placeholder="Enter emergency contact name...">
                  </div>
                  <div class="form-group">
                    <label for="emergencyPhone">Emergency Contact Phone</label>
                    <input type="tel" id="emergencyPhone" name="emergencyPhone" placeholder="Enter emergency contact phone...">
                  </div>
                </div>
                <div class="form-group">
                  <label for="emergencyRelationship">Relationship</label>
                  <input type="text" id="emergencyRelationship" name="emergencyRelationship" placeholder="Parent, Guardian, Sibling, etc.">
                </div>
              </div>

              <!-- Account Settings -->
              <div class="form-section">
                <h3><i class="fas fa-cog"></i> Account Settings</h3>
                <div class="form-group">
                  <div class="checkbox-group">
                    <label class="checkbox-label">
                      <input type="checkbox" id="sendWelcomeEmail" name="sendWelcomeEmail" checked>
                      <span class="checkmark"></span>
                      Send welcome email with login credentials
                    </label>
                    <label class="checkbox-label">
                      <input type="checkbox" id="sendSMSNotification" name="sendSMSNotification">
                      <span class="checkmark"></span>
                      Send SMS notification about appointment
                    </label>
                    <label class="checkbox-label">
                      <input type="checkbox" id="addToDirectory" name="addToDirectory" checked>
                      <span class="checkmark"></span>
                      Add to executive team directory
                    </label>
                    <label class="checkbox-label">
                      <input type="checkbox" id="requireTraining" name="requireTraining">
                      <span class="checkmark"></span>
                      Require orientation training
                    </label>
                  </div>
                </div>
              </div>

              <!-- Form Actions -->
              <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-user-plus"></i> Add Officer
                </button>
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('addOfficerForm').reset()">
                  <i class="fas fa-redo"></i> Reset Form
                </button>
                <button type="button" class="btn btn-outline" onclick="window.location.href='executive-team.html'">
                  <i class="fas fa-users"></i> View Team
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div><!-- /main-content -->
  </div><!-- /dashboard-container -->

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-dashboard.html"></div>

  <script>w3.includeHTML();</script>
  <script type="module" src="../../../src/scripts/components/header-admin.js"></script>

  <script type="module" src="../../../src/scripts/pages/dashboard/add-officer.js"></script>
</body>
</html>
