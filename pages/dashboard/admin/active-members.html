<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SWA Active Members - Admin Panel">
  <title>Active Members - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/unified-dashboard.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar Component -->
    <div w3-include-html="../components/sidebar-admin.html"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header Component -->
      <div w3-include-html="../components/header-admin.html"></div>

      <!-- Page Content -->
      <div class="content-section active">
        <div class="page-body">
          <div class="page-header">
            <h1><i class="fas fa-user-check"></i> Active Members</h1>
            <p>View and manage active SWA members</p>
          </div>
          
          <!-- Statistics Cards -->
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-user-check"></i>
              </div>
              <div class="stat-content">
                <h3 id="total-active">0</h3>
                <p>Total Active</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-calendar-check"></i>
              </div>
              <div class="stat-content">
                <h3 id="this-month-paid">0</h3>
                <p>This Month Paid</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-chart-line"></i>
              </div>
              <div class="stat-content">
                <h3 id="activity-rate">0%</h3>
                <p>Activity Rate</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-coins"></i>
              </div>
              <div class="stat-content">
                <h3 id="fully-paid">0</h3>
                <p>Fully Paid</p>
              </div>
            </div>
          </div>

          <!-- Active Members Table -->
          <div class="table-container">
            <div class="table-header">
              <h2><i class="fas fa-list"></i> Active Members List</h2>
              <div class="table-actions">
                <button class="btn btn-primary" onclick="window.location.href='../../contributions/pay.html'">
                  <i class="fas fa-plus"></i> Add Payment
                </button>
                <button class="btn btn-secondary" onclick="window.print()">
                  <i class="fas fa-print"></i> Print
                </button>
              </div>
            </div>
            
            <!-- Loading Indicator -->
            <div id="loading-indicator" class="loading-indicator" style="display: none;">
              <i class="fas fa-spinner fa-spin"></i>
              <p>Loading active members...</p>
            </div>
            
            <!-- Error Message -->
            <div id="error-message" class="error-message" style="display: none;"></div>
            
            <!-- Active Members Table -->
            <div class="table-responsive">
              <table>
                <thead>
                  <tr>
                    <th>Member Number</th>
                    <th>Full Name</th>
                    <th>Student ID</th>
                    <th>Email</th>
                    <th>Last Payment</th>
                    <th>Total Contributed</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="active-members-table">
                  <tr>
                    <td colspan="8" class="no-data-message">
                      <i class="fas fa-spinner fa-spin"></i>
                      Loading active members...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div><!-- /main-content -->
  </div><!-- /dashboard-container -->

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-dashboard.html"></div>

  <script>w3.includeHTML();</script>

  <script type="module" src="../../../src/scripts/pages/dashboard/active-members.js"></script>
</body>
</html>
