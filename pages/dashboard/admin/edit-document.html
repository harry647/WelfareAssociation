<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SWA Edit Document - Admin Panel">
  <title>Edit Document - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/unified-dashboard.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/edit-document.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar Component -->
    <div w3-include-html="../components/sidebar-admin.html"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header Component -->
      <div w3-include-html="../components/header-admin.html"></div>

      <!-- Page Content -->
      <div class="content-section active">
        <div class="page-body">
          <div class="page-header">
            <h1><i class="fas fa-edit"></i> Edit Document</h1>
            <p>Edit and update existing documents</p>
          </div>
          
          <!-- Edit Document Form -->
          <div class="form-container">
            <form id="editDocumentForm" class="form-grid">
              <!-- Document Information -->
              <div class="form-section">
                <h3><i class="fas fa-file-alt"></i> Document Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="documentTitle">Document Title *</label>
                    <input type="text" id="documentTitle" name="documentTitle" required placeholder="Enter document title...">
                  </div>
                  <div class="form-group">
                    <label for="documentType">Document Type *</label>
                    <select id="documentType" name="documentType" required>
                      <option value="">Select document type...</option>
                      <option value="meeting-minutes">Meeting Minutes</option>
                      <option value="financial-report">Financial Report</option>
                      <option value="policy">Policy Document</option>
                      <option value="procedure">Procedure Manual</option>
                      <option value="form">Form</option>
                      <option value="notice">Notice</option>
                      <option value="announcement">Announcement</option>
                      <option value="other">Other</option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                  <label for="documentDescription">Description</label>
                  <textarea id="documentDescription" name="documentDescription" rows="3" placeholder="Brief description of the document..."></textarea>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category">
                      <option value="">Select category...</option>
                      <option value="administrative">Administrative</option>
                      <option value="financial">Financial</option>
                      <option value="academic">Academic</option>
                      <option value="events">Events</option>
                      <option value="policies">Policies</option>
                      <option value="forms">Forms</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="accessLevel">Access Level</label>
                    <select id="accessLevel" name="accessLevel">
                      <option value="public">Public</option>
                      <option value="members">Members Only</option>
                      <option value="executive">Executive Only</option>
                      <option value="admin">Admin Only</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Current File Info -->
              <div class="form-section">
                <h3><i class="fas fa-file"></i> Current File</h3>
                <div class="current-file-info">
                  <div class="file-details">
                    <i class="fas fa-file-pdf"></i>
                    <div class="file-info-text">
                      <strong id="currentFileName">document.pdf</strong>
                      <p>Uploaded on: <span id="uploadDate">2024-01-15</span></p>
                      <p>File size: <span id="fileSize">2.5 MB</span></p>
                    </div>
                  </div>
                </div>
              </div>

              <!-- File Replacement -->
              <div class="form-section">
                <h3><i class="fas fa-sync"></i> Replace File (Optional)</h3>
                <div class="form-group">
                  <label for="documentFile">Select New File</label>
                  <div class="file-upload-area">
                    <input type="file" id="documentFile" name="documentFile" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.jpg,.jpeg,.png">
                    <div class="file-upload-drop-zone" id="dropZone">
                      <i class="fas fa-sync-alt"></i>
                      <p>Drag and drop new file here or click to browse</p>
                      <small>Leave empty to keep current file</small>
                    </div>
                    <div class="file-info" id="fileInfo" style="display: none;">
                      <i class="fas fa-file"></i>
                      <span id="fileName"></span>
                      <button type="button" class="btn-remove" id="removeFile">
                        <i class="fas fa-times"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Document Settings -->
              <div class="form-section">
                <h3><i class="fas fa-cog"></i> Document Settings</h3>
                <div class="form-group">
                  <div class="checkbox-group">
                    <label class="checkbox-label">
                      <input type="checkbox" id="sendNotification" name="sendNotification">
                      <span class="checkmark"></span>
                      Send notification to members about document update
                    </label>
                    <label class="checkbox-label">
                      <input type="checkbox" id="makeFeatured" name="makeFeatured">
                      <span class="checkmark"></span>
                      Feature this document on homepage
                    </label>
                    <label class="checkbox-label">
                      <input type="checkbox" id="allowDownload" name="allowDownload" checked>
                      <span class="checkmark"></span>
                      Allow members to download this document
                    </label>
                    <label class="checkbox-label">
                      <input type="checkbox" id="archiveDocument" name="archiveDocument">
                      <span class="checkmark"></span>
                      Archive this document (will hide from main view)
                    </label>
                  </div>
                </div>
              </div>

              <!-- Form Actions -->
              <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-save"></i> Save Changes
                </button>
                <button type="button" class="btn btn-secondary cancel-btn">
                  <i class="fas fa-times"></i> Cancel
                </button>
                <button type="button" class="btn btn-outline" onclick="window.location.href='documentation.html'">
                  <i class="fas fa-folder"></i> View Documents
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div><!-- /main-content -->
  </div><!-- /dashboard-container -->

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-dashboard.html"></div>

  <script>w3.includeHTML();</script>
  <script src="../../../src/scripts/pages/dashboard/header-admin.js"></script>

  <script type="module" src="../../../src/scripts/pages/dashboard/edit-document.js"></script>
</body>
</html>
