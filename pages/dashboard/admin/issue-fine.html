<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SWA Issue Fine - Admin Panel">
  <title>Issue Fine - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/unified-dashboard.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/issue-fine.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar Component -->
    <div w3-include-html="../components/sidebar-admin.html"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header Component -->
      <div w3-include-html="../components/header-admin.html"></div>

      <!-- Page Content -->
      <div class="content-section active">
        <div class="page-body">
          <div class="page-header">
            <h1><i class="fas fa-gavel"></i> Issue Fine</h1>
            <p>Issue fines to members</p>
          </div>
          
          <!-- Issue Fine Form -->
          <div class="form-container">
            <form id="issueFineForm" class="form-grid">
              <!-- Member Selection -->
              <div class="form-section">
                <h3><i class="fas fa-user"></i> Member Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="memberId">Select Member *</label>
                    <select id="memberId" name="memberId" required>
                      <option value="">Choose a member...</option>
                      <!-- Options will be populated dynamically -->
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="memberSearch">Search Member</label>
                    <input type="text" id="memberSearch" placeholder="Search by name or ID...">
                  </div>
                </div>
              </div>

              <!-- Fine Details -->
              <div class="form-section">
                <h3><i class="fas fa-gavel"></i> Fine Details</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="fineType">Fine Type *</label>
                    <select id="fineType" name="fineType" required>
                      <option value="">Select fine type...</option>
                      <option value="late-payment">Late Payment</option>
                      <option value="meeting-absence">Meeting Absence</option>
                      <option value="property-damage">Property Damage</option>
                      <option value="rule-violation">Rule Violation</option>
                      <option value="other">Other</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="amount">Amount (Ksh) *</label>
                    <input type="number" id="amount" name="amount" min="0" step="0.01" required placeholder="0.00">
                  </div>
                </div>
                <div class="form-group">
                  <label for="reason">Reason/Description *</label>
                  <textarea id="reason" name="reason" rows="4" required placeholder="Describe the reason for this fine..."></textarea>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="dueDate">Due Date *</label>
                    <input type="date" id="dueDate" name="dueDate" required>
                  </div>
                  <div class="form-group">
                    <label for="urgency">Urgency Level</label>
                    <select id="urgency" name="urgency">
                      <option value="low">Low</option>
                      <option value="medium">Medium</option>
                      <option value="high">High</option>
                      <option value="urgent">Urgent</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Notification Settings -->
              <div class="form-section">
                <h3><i class="fas fa-bell"></i> Notification Settings</h3>
                <div class="form-group">
                  <div class="checkbox-group">
                    <label class="checkbox-label">
                      <input type="checkbox" id="sendEmail" name="sendEmail" checked>
                      <span class="checkmark"></span>
                      Send email notification to member
                    </label>
                    <label class="checkbox-label">
                      <input type="checkbox" id="sendSMS" name="sendSMS">
                      <span class="checkmark"></span>
                      Send SMS notification to member
                    </label>
                    <label class="checkbox-label">
                      <input type="checkbox" id="sendReminder" name="sendReminder" checked>
                      <span class="checkmark"></span>
                      Set automatic reminder before due date
                    </label>
                  </div>
                </div>
              </div>

              <!-- Form Actions -->
              <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-gavel"></i> Issue Fine
                </button>
                <button type="button" class="btn btn-secondary cancel-btn">
                  <i class="fas fa-times"></i> Cancel
                </button>
                <button type="button" class="btn btn-outline" onclick="window.location.href='fines-collection.html'">
                  <i class="fas fa-list"></i> View All Fines
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div><!-- /main-content -->
  </div><!-- /dashboard-container -->

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-dashboard.html"></div>

  <script>w3.includeHTML();</script>
  <script type="module" src="../../../src/scripts/components/header-admin.js"></script>

  <script type="module" src="../../../src/scripts/pages/dashboard/issue-fine.js"></script>
</body>
</html>
