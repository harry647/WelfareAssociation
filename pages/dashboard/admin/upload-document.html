<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Upload Document - SWA Admin Panel">
  <title>Upload Document - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/upload-document.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/admin-dashboard.css">
  
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar Component -->
  <div w3-include-html="../components/sidebar-admin.html"></div>

  <!-- Main Content -->
  <div class="main" id="mainContent">

    <!-- Header Component -->
    <div w3-include-html="../components/header-admin.html"></div>
        <div class="admin-avatar">VO</div>
        <div class="admin-details">
          <h3>Vincent Otieno</h3>
          <p>Administrator</p>
          <span class="admin-role">Chairman, SWA</span>
        </div>
      </div>
      <a href="../../../index.html" class="logout-btn-header"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <!-- Page Content -->
    <div class="content-section active">
      <div class="page-body">

        <div class="page-header">
          <h1><i class="fas fa-plus-circle"></i> Upload Document</h1>
          <p>Upload a new document to the documentation library</p>
        </div>

        <!-- Upload Form -->
        <section class="data-section">
          <h2><i class="fas fa-cloud-upload-alt"></i> Document Upload</h2>
          <div class="form-container">
            <form id="uploadForm">
              <div class="form-group">
                <label for="documentName">Document Name</label>
                <input type="text" id="documentName" placeholder="Enter document name" required>
              </div>

              <div class="form-group">
                <label for="category">Category</label>
                <select id="category" required>
                  <option value="">-- Select Category --</option>
                  <option value="constitution">Constitution & By-laws</option>
                  <option value="finance">Financial Guidelines</option>
                  <option value="guidelines">Member Guidelines</option>
                  <option value="procedures">Procedures</option>
                  <option value="other">Other</option>
                </select>
              </div>

              <div class="form-group">
                <label for="documentFile">Select File</label>
                <input type="file" id="documentFile" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx" required>
                <small>Accepted formats: PDF, DOC, DOCX, XLS, XLSX, PPT, PPTX</small>
              </div>

              <div class="form-group">
                <label for="version">Version</label>
                <input type="text" id="version" placeholder="e.g., v1.0" required>
              </div>

              <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" rows="4" placeholder="Describe this document..."></textarea>
              </div>

              <div class="form-actions">
                <a href="documentation.html" class="btn">Cancel</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-upload"></i> Upload Document</button>
              </div>
            </form>
          </div>
        </section>

      </div>
    </div>

  </div>

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-dashboard.html"></div>

  <!-- W3.js component loader -->
  <script>
    w3.includeHTML();
  </script>
  
  <script src="../../../src/scripts/pages/dashboard/upload-document.js"></script>
</body>
</html>
