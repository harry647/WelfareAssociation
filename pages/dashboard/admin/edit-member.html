<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Edit Member - SWA Admin Panel">
  <title>Edit Member - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/members.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/admin-dashboard.css">
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar Component -->
  <div w3-include-html="../components/sidebar-admin.html"></div>

  <!-- Main Content -->
  <div class="main" id="mainContent">

    <!-- Header Component -->
    <div w3-include-html="../components/header-admin.html"></div>
        <div class="admin-details">
          <h3>Vincent Otieno</h3>
          <p>Administrator</p>
          <span class="admin-role">Chairman, SWA</span>
        </div>
      </div>
      <button class="logout-btn-header"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <!-- Page Content -->
    <div class="content-section active">
      <div class="page-body">

        <div class="page-header">
          <h1><i class="fas fa-user-edit"></i> Edit Member</h1>
          <p>Update member information</p>
        </div>

        <!-- Back Button -->
        <div class="back-link">
          <a href="../shared/members.html" class="btn"><i class="fas fa-arrow-left"></i> Back to Members</a>
        </div>

        <!-- Edit Member Form -->
        <section class="data-section">
          <h2><i class="fas fa-user"></i> Member Information</h2>
          <div class="form-container">
            <form id="editMemberForm">
              <!-- Personal Information -->
              <div class="form-section">
                <h3>Personal Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" required>
                  </div>
                  <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" required>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                  </div>
                  <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone">
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="dateOfBirth">Date of Birth</label>
                    <input type="date" id="dateOfBirth" name="dateOfBirth">
                  </div>
                  <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender">
                      <option value="">-- Select --</option>
                      <option value="Male">Male</option>
                      <option value="Female">Female</option>
                      <option value="Other">Other</option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                  <label for="address">Address</label>
                  <input type="text" id="address" name="address">
                </div>
              </div>

              <!-- Membership Information -->
              <div class="form-section">
                <h3>Membership Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="memberNumber">Member Number</label>
                    <input type="text" id="memberNumber" name="memberNumber" readonly>
                  </div>
                  <div class="form-group">
                    <label for="membershipType">Membership Type</label>
                    <select id="membershipType" name="membershipType">
                      <option value="Regular">Regular</option>
                      <option value="Premium">Premium</option>
                      <option value="Lifetime">Lifetime</option>
                    </select>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="membershipStatus">Status</label>
                    <select id="membershipStatus" name="membershipStatus">
                      <option value="active">Active</option>
                      <option value="pending">Pending</option>
                      <option value="inactive">Inactive</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="joinDate">Join Date</label>
                    <input type="date" id="joinDate" name="joinDate" readonly>
                  </div>
                </div>
              </div>

              <!-- Emergency Contact -->
              <div class="form-section">
                <h3>Emergency Contact</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="emergencyName">Contact Name</label>
                    <input type="text" id="emergencyName" name="emergencyName">
                  </div>
                  <div class="form-group">
                    <label for="emergencyPhone">Contact Phone</label>
                    <input type="tel" id="emergencyPhone" name="emergencyPhone">
                  </div>
                </div>
                <div class="form-group">
                  <label for="emergencyRelationship">Relationship</label>
                  <input type="text" id="emergencyRelationship" name="emergencyRelationship">
                </div>
              </div>

              <!-- Next of Kin -->
              <div class="form-section">
                <h3>Next of Kin</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="kinName">Name</label>
                    <input type="text" id="kinName" name="kinName">
                  </div>
                  <div class="form-group">
                    <label for="kinPhone">Phone</label>
                    <input type="tel" id="kinPhone" name="kinPhone">
                  </div>
                </div>
                <div class="form-group">
                  <label for="kinRelationship">Relationship</label>
                  <input type="text" id="kinRelationship" name="kinRelationship">
                </div>
              </div>

              <div class="form-actions">
                <a href="../shared/members.html" class="btn">Cancel</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
              </div>
            </form>
          </div>
        </section>

      </div>
    </div>

  </div>

  <!-- W3.js component loader -->
  <script>
    w3.includeHTML();
  </script>
  
  <script type="module" src="../../../src/scripts/pages/dashboard/edit-member.js"></script>
</body>
</html>
