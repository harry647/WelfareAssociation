<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SWA Create Notice - Admin Panel">
  <title>Create Notice - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/unified-dashboard.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/create-notice.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar Component -->
    <div w3-include-html="../components/sidebar-admin.html"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header Component -->
      <div w3-include-html="../components/header-admin.html"></div>

      <!-- Page Content -->
      <div class="content-section active">
        <div class="page-body">
          <div class="page-header">
            <h1><i class="fas fa-sticky-note"></i> Create Notice</h1>
            <p>Create and publish notices for members</p>
          </div>
          
          <!-- Create Notice Form -->
          <div class="form-container">
            <form id="createNoticeForm" class="form-grid">
              <!-- Notice Information -->
              <div class="form-section">
                <h3><i class="fas fa-sticky-note"></i> Notice Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="title">Notice Title *</label>
                    <input type="text" id="title" name="title" required placeholder="Enter notice title...">
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="type">Notice Type *</label>
                    <select id="type" name="type" required>
                      <option value="">Select type...</option>
                      <option value="general">General</option>
                      <option value="important">Important</option>
                      <option value="urgent">Urgent</option>
                      <option value="event">Event</option>
                      <option value="meeting">Meeting</option>
                      <option value="reminder">Reminder</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="priority">Priority Level *</label>
                    <select id="priority" name="priority" required>
                      <option value="">Select priority...</option>
                      <option value="low">Low</option>
                      <option value="normal">Normal</option>
                      <option value="high">High</option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                  <label for="content">Notice Content *</label>
                  <textarea id="content" name="content" rows="6" required placeholder="Write the notice content here..."></textarea>
                  <div class="char-counter">
                    <span id="charCount">0</span> / 1000 characters
                  </div>
                </div>
              </div>

              <!-- Notice Settings -->
              <div class="form-section">
                <h3><i class="fas fa-cog"></i> Notice Settings</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="expiryDate">Expiry Date</label>
                    <input type="date" id="expiryDate" name="expiryDate">
                    <small>Leave empty for no expiry</small>
                  </div>
                  <div class="form-group">
                    <label for="targetAudience">Target Audience</label>
                    <select id="targetAudience" name="targetAudience">
                      <option value="all">All Members</option>
                      <option value="members">Members Only</option>
                      <option value="executives">Executives Only</option>
                      <option value="students">Students Only</option>
                      <option value="staff">Staff Only</option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                  <div class="checkbox-group">
                    <label class="checkbox-label">
                      <input type="checkbox" id="sendEmail" name="sendEmail" checked>
                      <span class="checkmark"></span>
                      Send email notification to members
                    </label>
                    <label class="checkbox-label">
                      <input type="checkbox" id="sendSMS" name="sendSMS">
                      <span class="checkmark"></span>
                      Send SMS notification to members
                    </label>
                    <label class="checkbox-label">
                      <input type="checkbox" id="pinNotice" name="pinNotice">
                      <span class="checkmark"></span>
                      Pin this notice to the top
                    </label>
                    <label class="checkbox-label">
                      <input type="checkbox" id="allowComments" name="allowComments">
                      <span class="checkmark"></span>
                      Allow members to comment on this notice
                    </label>
                  </div>
                </div>
              </div>

              <!-- Notice Preview -->
              <div class="form-section">
                <h3><i class="fas fa-eye"></i> Notice Preview</h3>
                <div class="notice-preview">
                  <div class="notice-card">
                    <div class="notice-header">
                      <h4 id="previewTitle">Notice Title</h4>
                      <span class="priority-badge" id="previewPriority">Medium</span>
                    </div>
                    <div class="notice-content">
                      <p id="previewContent">Notice content will appear here...</p>
                    </div>
                    <div class="notice-footer">
                      <small>Posted: <span id="previewDate">Today</span></small>
                      <small>Expires: <span id="previewExpiry">Never</span></small>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Form Actions -->
              <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-paper-plane"></i> Publish Notice
                </button>
                <button type="button" class="btn btn-secondary" id="saveDraft">
                  <i class="fas fa-save"></i> Save Draft
                </button>
                <button type="button" class="btn btn-outline cancel-btn">
                  <i class="fas fa-times"></i> Cancel
                </button>
                <button type="button" class="btn btn-outline" onclick="window.location.href='../shared/notices.html'">
                  <i class="fas fa-list"></i> View Notices
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div><!-- /main-content -->
  </div><!-- /dashboard-container -->

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-dashboard.html"></div>

  <script>w3.includeHTML();</script>
  <script src="../../../src/scripts/pages/dashboard/header-admin.js"></script>
  <script type="module" src="../../../src/scripts/pages/dashboard/create-notice.js"></script>
</body>
</html>
