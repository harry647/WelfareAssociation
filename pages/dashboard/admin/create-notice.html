<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create Notice - SWA Admin Panel">
  <title>Create Notice - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/create-notice.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/admin-dashboard.css">
  
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar Component -->
  <div w3-include-html="../components/sidebar-admin.html"></div>

  <!-- Main Content -->
  <div class="main" id="mainContent">

    <!-- Header Component -->
    <div w3-include-html="../components/header-admin.html"></div>
        <div class="admin-avatar">VO</div>
        <div class="admin-details">
          <h3>Vincent Otieno</h3>
          <p>Administrator</p>
          <span class="admin-role">Chairman, SWA</span>
        </div>
      </div>
      <button type="button" class="logout-btn-header"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <!-- Page Content -->
    <div class="content-section active">
      <div class="page-body">

        <div class="page-header">
          <h1><i class="fas fa-plus-circle"></i> Create Notice</h1>
          <p>Create a new notice or announcement</p>
        </div>

        <!-- Create Notice Form -->
        <section class="data-section">
          <h2><i class="fas fa-file-alt"></i> Notice Details</h2>
          <div class="form-container">
            <form id="createNoticeForm">
              <div class="form-group">
                <label for="noticeTitle">Notice Title</label>
                <input type="text" id="noticeTitle" placeholder="Enter notice title" required>
              </div>

              <div class="form-group">
                <label for="category">Category</label>
                <select id="category" required>
                  <option value="">-- Select Category --</option>
                  <option value="events">Events</option>
                  <option value="financial">Financial</option>
                  <option value="urgent">Urgent</option>
                  <option value="general">General</option>
                </select>
              </div>

              <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" required>
                  <option value="normal">Normal</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                  <option value="urgent">Urgent</option>
                </select>
              </div>

              <div class="form-group">
                <label for="targetAudience">Target Audience</label>
                <select id="targetAudience" required>
                  <option value="all">All Members</option>
                  <option value="executive">Executive Team</option>
                  <option value="committee">Committee Members</option>
                  <option value="specific">Specific Group</option>
                </select>
              </div>

              <div class="form-group">
                <label for="expiryDate">Expiry Date</label>
                <input type="date" id="expiryDate" required>
              </div>

              <div class="form-group">
                <label for="noticeContent">Notice Content</label>
                <textarea id="noticeContent" rows="6" placeholder="Write your notice here..."></textarea>
              </div>

              <div class="form-actions">
                <a href="notices.html" class="btn">Cancel</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save as Draft</button>
                <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Publish Now</button>
              </div>
            </form>
          </div>
        </section>

      </div>
    </div>

  </div>

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-dashboard.html"></div>

  <!-- W3.js component loader -->
  <script>
    w3.includeHTML();
  </script>
  
  <script src="../../../src/scripts/pages/dashboard/create-notice.js"></script>
</body>
</html>
