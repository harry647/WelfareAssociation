<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Send SMS - SWA Admin Panel">
  <title>Send SMS - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/styles/pages/dashboard/send-sms.css">
  <link rel="stylesheet" href="../../src/styles/pages/dashboard/admin-dashboard.css">
  
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar Component -->
  <div w3-include-html="../components/sidebar-admin.html"></div>

  <!-- Main Content -->
  <div class="main" id="mainContent">

    <!-- Header Component -->
    <div w3-include-html="../components/header-admin.html"></div>
        <div class="admin-avatar">VO</div>
        <div class="admin-details">
          <h3>Vincent Otieno</h3>
          <p>Administrator</p>
          <span class="admin-role">Chairman, SWA</span>
        </div>
      </div>
      <button type="button" class="logout-btn-header"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <!-- Page Content -->
    <div class="content-section active">
      <div class="page-body">

        <div class="page-header">
          <h1><i class="fas fa-sms"></i> Send SMS</h1>
          <p>Send SMS to members</p>
        </div>

        <!-- Quick Stats -->
        <div class="cards">
          <div class="card">
            <h3><i class="fas fa-sms"></i> SMS Balance</h3>
            <p class="stat-number">450</p>
            <p class="stat-label">Credits Left</p>
          </div>
          <div class="card">
            <h3><i class="fas fa-paper-plane"></i> Sent This Month</h3>
            <p class="stat-number">85</p>
            <p class="stat-label">Messages</p>
          </div>
          <div class="card">
            <h3><i class="fas fa-dollar-sign"></i> Cost per SMS</h3>
            <p class="stat-number">Ksh 1</p>
            <p class="stat-label">Per Message</p>
          </div>
        </div>

        <!-- Send SMS Form -->
        <section class="data-section">
          <h2><i class="fas fa-mobile-alt"></i> SMS Details</h2>
          <div class="form-container">
            <form id="sendSmsForm">
              <div class="form-group">
                <label for="recipients">Recipients</label>
                <select id="recipients" required>
                  <option value="">-- Select Recipients --</option>
                  <option value="all">All Members (22)</option>
                  <option value="active">Active Members (18)</option>
                  <option value="executive">Executive Team (5)</option>
                  <option value="finance">Finance Committee (4)</option>
                  <option value="events">Events Committee (6)</option>
                  <option value="welfare">Welfare Committee (5)</option>
                  <option value="custom">Custom Numbers</option>
                </select>
              </div>

              <div class="form-group">
                <label for="message">SMS Message</label>
                <textarea id="message" rows="4" placeholder="Type your SMS message here (160 characters recommended)..." maxlength="160"></textarea>
                <small>Character count: <span id="charCount">0</span>/160</small>
              </div>

              <div class="form-group">
                <label>
                  <input type="checkbox" id="scheduleSms"> Schedule for later
                </label>
              </div>

              <div class="form-group" id="scheduleDateGroup" style="display:none;">
                <label for="scheduleDate">Send Date & Time</label>
                <input type="datetime-local" id="scheduleDate">
              </div>

              <div class="form-actions">
                <a href="notices.html" class="btn">Cancel</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send SMS</button>
              </div>
            </form>
          </div>
        </section>

      </div>
    </div>

  </div>

  <!-- W3.js component loader -->
  <script>
    w3.includeHTML();
  </script>
  
  <script src="../../src/scripts/pages/dashboard/send-sms.js"></script>
</body>
</html>
