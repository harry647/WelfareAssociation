<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create Folder - SWA Admin Panel">
  <title>Create Folder - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/create-folder.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/admin-dashboard.css">
  
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar Component -->
  <div w3-include-html="../components/sidebar-admin.html"></div>

  <!-- Main Content -->
  <div class="main" id="mainContent">

    <!-- Header Component -->
    <div w3-include-html="../components/header-admin.html"></div>

    <!-- Page Content -->
    <div class="content-section active">
      <div class="page-body">

        <div class="page-header">
          <h1><i class="fas fa-folder-plus"></i> Create Folder</h1>
          <p>Create a new folder to organize documents</p>
        </div>

        <!-- Create Folder Form -->
        <section class="data-section">
          <h2><i class="fas fa-folder-tree"></i> Folder Details</h2>
          <div class="form-container">
            <form id="createFolderForm">
              <div class="form-group">
                <label for="folderName">Folder Name</label>
                <input type="text" id="folderName" placeholder="Enter folder name" required>
              </div>

              <div class="form-group">
                <label for="parentFolder">Parent Folder (Optional)</label>
                <select id="parentFolder">
                  <option value="">-- Root (No Parent) --</option>
                  <option value="constitution">Constitution & By-laws</option>
                  <option value="finance">Financial Guidelines</option>
                  <option value="guidelines">Member Guidelines</option>
                  <option value="procedures">Procedures</option>
                </select>
              </div>

              <div class="form-group">
                <label for="folderDescription">Description</label>
                <textarea id="folderDescription" rows="3" placeholder="Describe this folder..."></textarea>
              </div>

              <div class="form-group">
                <label for="accessLevel">Access Level</label>
                <select id="accessLevel" required>
                  <option value="">-- Select Access Level --</option>
                  <option value="public">Public - All Members</option>
                  <option value="officers">Officers Only</option>
                  <option value="executive">Executive Team Only</option>
                  <option value="admin">Admin Only</option>
                </select>
              </div>

              <div class="form-actions">
                <a href="documentation.html" class="btn">Cancel</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-folder-plus"></i> Create Folder</button>
              </div>
            </form>
          </div>
        </section>

      </div>
    </div>

  </div>

  <!-- W3.js component loader -->
  <script>
    w3.includeHTML();
  </script>
  
  <script src="../../src/scripts/pages/dashboard/create-folder.js"></script>
</body>
</html>
