<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SWA Archive Documents - Admin Panel">
  <title>Archive Documents - Student Welfare Association | JOOUST</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- W3.js for component includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/unified-dashboard.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/archive-docs.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar Component -->
    <div w3-include-html="../components/sidebar-admin.html"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header Component -->
      <div w3-include-html="../components/header-admin.html"></div>

      <!-- Page Content -->
      <div class="content-section active">
        <div class="page-body">
          <div class="page-header">
            <h1><i class="fas fa-archive"></i> Archive Documents</h1>
            <p>Manage archived documents and records</p>
          </div>
          
          <!-- Search and Filter Section -->
          <div class="search-filter-section">
            <div class="search-box">
              <i class="fas fa-search"></i>
              <input type="text" placeholder="Search archived documents...">
            </div>
            <div class="filter-buttons">
              <button class="filter-btn active" data-filter="all">All</button>
              <button class="filter-btn" data-filter="meeting-minutes">Meeting Minutes</button>
              <button class="filter-btn" data-filter="financial">Financial</button>
              <button class="filter-btn" data-filter="policies">Policies</button>
              <button class="filter-btn" data-filter="other">Other</button>
            </div>
          </div>

          <!-- Archive Statistics -->
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-archive"></i>
              </div>
              <div class="stat-content">
                <h3 id="totalArchived">0</h3>
                <p>Total Archived</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-calendar-alt"></i>
              </div>
              <div class="stat-content">
                <h3 id="thisMonth">0</h3>
                <p>This Month</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-database"></i>
              </div>
              <div class="stat-content">
                <h3 id="storageUsed">0 MB</h3>
                <p>Storage Used</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-clock"></i>
              </div>
              <div class="stat-content">
                <h3 id="oldestArchive">--</h3>
                <p>Oldest Archive</p>
              </div>
            </div>
          </div>

          <!-- Archived Documents Table -->
          <div class="table-container">
            <div class="table-header">
              <h2><i class="fas fa-list"></i> Archived Documents</h2>
              <div class="table-actions">
                <button class="btn btn-primary" onclick="window.location.href='documentation.html'">
                  <i class="fas fa-folder"></i> Active Documents
                </button>
                <button class="btn btn-secondary" onclick="window.print()">
                  <i class="fas fa-print"></i> Print
                </button>
              </div>
            </div>
            
            <div class="table-responsive">
              <table>
                <thead>
                  <tr>
                    <th>Document Title</th>
                    <th>Type</th>
                    <th>Category</th>
                    <th>Archived Date</th>
                    <th>Archived By</th>
                    <th>File Size</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="archivedDocumentsTable">
                  <tr>
                    <td colspan="7" class="no-data-message">
                      <i class="fas fa-spinner fa-spin"></i>
                      Loading archived documents...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Bulk Actions -->
          <div class="bulk-actions" id="bulkActions" style="display: none;">
            <div class="bulk-actions-content">
              <span class="selected-count">0 documents selected</span>
              <div class="bulk-buttons">
                <button class="btn btn-secondary" onclick="restoreSelected()">
                  <i class="fas fa-undo"></i> Restore Selected
                </button>
                <button class="btn btn-danger" onclick="deleteSelected()">
                  <i class="fas fa-trash"></i> Delete Permanently
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div><!-- /main-content -->
  </div><!-- /dashboard-container -->

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-dashboard.html"></div>

  <script>w3.includeHTML();</script>

  <script type="module" src="../../../src/scripts/pages/dashboard/archive-docs.js"></script>
</body>
</html>
