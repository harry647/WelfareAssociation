<!DOCTYPE html>
<html lang="en">
<head>
    <!-- W3 Schools HTML Includes -->
    <script src="https://www.w3schools.com/lib/w3.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SWA Dashboard Layout Template">
  <title>Dashboard Layout - Student Welfare Association</title>
  <!-- Main Styles -->
  <link rel="stylesheet" href="../../../src/styles/main.css">
  <link rel="stylesheet" href="../../../src/styles/original/header.css">
  <link rel="stylesheet" href="../../../src/styles/pages/shared/navigation.css">
  <link rel="stylesheet" href="../../../src/styles/original/footer.css">
  <!-- Dashboard Layout Styles -->
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/dashboard-layout.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

  <!-- Top Bar (Header Component) -->
  <div w3-include-html="../components/header-shared.html"></div>

  <!-- Main Content -->
  <main class="content">
    <section class="main-content">
      <h2>Welcome</h2>
      <p>This is your main dashboard content area.</p>
      <p>You can add sections, cards, articles, or data tables here to manage SWA operations.</p>
      
      <div class="stats-grid">
        <div class="stat-card">
          <h3><i class="fas fa-users"></i> 22</h3>
          <p>Total Members</p>
        </div>
        <div class="stat-card">
          <h3><i class="fas fa-money-bill-wave"></i> Ksh 7,000</h3>
          <p>Contributions</p>
        </div>
        <div class="stat-card">
          <h3><i class="fas fa-hand-holding-usd"></i> 5</h3>
          <p>Loan Applications</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-shared.html"></div>

  <!-- W3 Schools HTML Includes Script -->
  <script>
      w3.includeHTML();
  </script>

  <script src="../../../src/scripts/pages/dashboard/dashboard-layout.js"></script>
</body>
</html>
