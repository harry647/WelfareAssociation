<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SWA Members Management - Admin Panel">
  <title>Members Management - Student Welfare Association | JOOUST</title>
  <!-- W3 Schools HTML Includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/members.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/admin-dashboard.css">
</head>
<body>

  <!-- Top Bar (Header Component) -->
  <div w3-include-html="../components/header-shared.html"></div>

  <!-- Main Content -->
  <div class="main" id="mainContent">

    <!-- Page Content -->
    <div class="content-section active">
      <div class="page-body">

        <div class="page-header">
          <h1><i class="fas fa-users"></i> Members Management</h1>
          <p>Manage all SWA members</p>
        </div>

        <!-- Members Table -->
        <section class="data-section">
          <h2><i class="fas fa-list"></i> All Members</h2>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Join Date</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="members-table">
                <!-- Members will be loaded dynamically from API -->
                  <td>
                    <button class="btn">View</button>
                    <button class="btn">Edit</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <!-- Quick Actions -->
        <section class="quick-actions">
          <h2><i class="fas fa-bolt"></i> Quick Actions</h2>
          <div class="action-buttons">
            <a href="../../../auth/registration-form.html" class="action-btn"><i class="fas fa-user-plus"></i> Add Member</a>
            <a href="../../../reports/index.html" class="action-btn"><i class="fas fa-file-export"></i> Export List</a>
            <a href="../../../public/contact-information.html" class="action-btn"><i class="fas fa-envelope"></i> Send Email</a>
          </div>
        </section>

      </div>
    </div>

  </div>

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-shared.html"></div>

  <!-- W3 Schools HTML Includes Script -->
  <script>
      w3.includeHTML();
  </script>

  <script type="module" src="../../src/scripts/pages/dashboard/members.js"></script>
</body>
</html>
