<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Set Savings Goal - SWA Admin Panel">
  <title>Set Savings Goal - Student Welfare Association | JOOUST</title>
  <!-- W3 Schools HTML Includes -->
  <script src="https://www.w3schools.com/lib/w3.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/savings-goal.css">
  <link rel="stylesheet" href="../../../src/styles/pages/dashboard/admin-dashboard.css">
</head>
<body>

  <!-- Top Bar (Header Component) -->
  <div w3-include-html="../components/header-shared.html"></div>

  <!-- Main Content -->
  <div class="main" id="mainContent">

    <!-- Page Content -->
    <div class="content-section active">
      <div class="page-body">

        <div class="page-header">
          <h1><i class="fas fa-bullseye"></i> Set Savings Goal</h1>
          <p>Create a new savings goal for a member</p>
        </div>

        <!-- Savings Goal Form -->
        <section class="data-section">
          <h2><i class="fas fa-target"></i> Goal Details</h2>
          <div class="form-container">
            <form id="savingsGoalForm">
              <div class="form-group">
                <label for="memberSelect">Select Member</label>
                <select id="memberSelect" required>
                  <option value="">-- Select Member --</option>
                  <option value="JOO/2024/001">Lavenda Achieng (JOO/2024/001)</option>
                  <option value="JOO/2024/002">Mary Odundo (JOO/2024/002)</option>
                  <option value="JOO/2024/003">Francis Opiyo (JOO/2024/003)</option>
                  <option value="JOO/2024/004">Vincent Otieno (JOO/2024/004)</option>
                  <option value="JOO/2024/005">Mary Atieno (JOO/2024/005)</option>
                  <option value="JOO/2024/006">Sarah Kemunto (JOO/2024/006)</option>
                  <option value="JOO/2024/007">Jeff Juma (JOO/2024/007)</option>
                  <option value="JOO/2024/008">John Ochieng (JOO/2024/008)</option>
                  <option value="JOO/2024/009">Yvonne Achieng (JOO/2024/009)</option>
                  <option value="JOO/2024/010">Emily Akinyi (JOO/2024/010)</option>
                </select>
              </div>

              <div class="form-group">
                <label for="goalName">Goal Name</label>
                <input type="text" id="goalName" placeholder="e.g., Emergency Fund, Education, Business" required>
              </div>

              <div class="form-group">
                <label for="targetAmount">Target Amount (Ksh)</label>
                <input type="number" id="targetAmount" placeholder="Enter target amount" min="0" required>
              </div>

              <div class="form-group">
                <label for="currentSavings">Current Savings (Ksh)</label>
                <input type="number" id="currentSavings" placeholder="Enter current savings amount" min="0" required>
              </div>

              <div class="form-group">
                <label for="targetDate">Target Date</label>
                <input type="date" id="targetDate" required>
              </div>

              <div class="form-group">
                <label for="goalDescription">Description (Optional)</label>
                <textarea id="goalDescription" rows="3" placeholder="Add notes about this savings goal..."></textarea>
              </div>

              <div class="form-actions">
                <a href="../admin/members-savings.html" class="btn">Cancel</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Create Goal</button>
              </div>
            </form>
          </div>
        </section>

      </div>
    </div>

  </div>

  <!-- Footer Component -->
  <div w3-include-html="../components/footer-shared.html"></div>

  <!-- W3 Schools HTML Includes Script -->
  <script>
      w3.includeHTML();
  </script>

  <script src="../../src/scripts/pages/dashboard/savings-goal.js"></script>
</body>
</html>
