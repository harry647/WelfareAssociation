<!DOCTYPE html>
<html lang="en">
<head>
    <!-- W3 Schools HTML Includes -->
    <script src="https://www.w3schools.com/lib/w3.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SWA Forgot Password - Reset your Student Welfare Association account password">
  <title>Forgot Password - Student Welfare Association | JOOUST</title>
  <!-- Main Styles -->
  <link rel="stylesheet" href="../../src/styles/main.css">
  <link rel="stylesheet" href="../../src/styles/original/header.css">
  <link rel="stylesheet" href="../../src/styles/pages/shared/navigation.css">
  <link rel="stylesheet" href="../../src/styles/original/footer.css">
  <!-- Forgot Password Page Styles -->
  <link rel="stylesheet" href="../../src/styles/pages/auth/forgot-password.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
  <!-- Shared Header -->
  <div w3-include-html="../shared/header.html"></div>

  <div class="forgot-password-page">
    <div class="forgot-password-card">
      <div class="forgot-password-card__header">
        <img src="../../images/Welfarelogo.webp" alt="SWA Logo" class="forgot-password-card__logo">
        <h1 class="forgot-password-card__title">Reset Your Password</h1>
        <p class="forgot-password-card__subtitle">Enter your email address and we'll send you a link to reset your password</p>
      </div>
      
      <form id="forgot-password-form" class="forgot-password-form">
        <div class="forgot-password-form__group">
          <label for="email" class="forgot-password-form__label forgot-password-form__label--required">Email Address</label>
          <div class="forgot-password-form__input-wrapper">
            <i class="fas fa-envelope forgot-password-form__icon"></i>
            <input type="email" id="email" class="forgot-password-form__input" placeholder="Enter your registered email" required>
          </div>
        </div>

        <button type="submit" class="forgot-password-form__submit">
          <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>

        <div class="forgot-password-form__back">
          <a href="login-page.html" class="forgot-password-form__back-link">
            <i class="fas fa-arrow-left"></i> Back to Login
          </a>
        </div>
      </form>

      <!-- Success Message (Hidden by default) -->
      <div id="success-message" class="forgot-password-card__success" style="display: none;">
        <i class="fas fa-check-circle forgot-password-card__success-icon"></i>
        <h3 class="forgot-password-card__success-title">Reset Link Sent!</h3>
        <p class="forgot-password-card__success-text">We've sent a password reset link to your email address. Please check your inbox and follow the instructions.</p>
      </div>
    </div>
  </div>

  <!-- Shared Footer -->
  <div w3-include-html="../shared/footer.html"></div>
  <!-- Forgot Password Page Script -->
  <script type="module" src="../../src/scripts/pages/auth/forgot-password.js"></script>
    <!-- W3 Schools HTML Includes Script -->
    <script>
        w3.includeHTML();
    </script>
</body>
</html>
