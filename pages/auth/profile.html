<!DOCTYPE html>
<html lang="en">

<head>
    <!-- W3 Schools HTML Includes -->
    <script src="https://www.w3schools.com/lib/w3.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="SWA Team">
    <meta name="description" content="SWA Profile - Update your member profile">
    <title>My Profile - Student Welfare Association | JOOUST</title>
    <!-- Main Styles -->
    <link rel="stylesheet" href="../../src/styles/main.css">
    <link rel="stylesheet" href="../../src/styles/original/header.css">
    <link rel="stylesheet" href="../../src/styles/pages/shared/navigation.css">
    <link rel="stylesheet" href="../../src/styles/original/footer.css">
    <!-- Profile Styles -->
    <link rel="stylesheet" href="../../src/styles/pages/auth/profile.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <!-- Shared Header -->
    <div w3-include-html="../shared/header.html"></div>

    <header class="profile-page__header">
        <div class="profile-page__header-content">
            <h1 class="profile-page__title"><i class="fas fa-user-circle"></i> My Profile</h1>
            <p class="profile-page__subtitle">Manage your personal information and account settings</p>
        </div>
    </header>

    <main class="profile-page">
        <div class="profile-page__container">
            <!-- Profile Summary Card -->
            <section class="profile-summary">
                <div class="profile-summary__avatar">
                    <i class="fas fa-user-circle"></i>
                    <button class="profile-summary__change-avatar" title="Change avatar">
                        <i class="fas fa-camera"></i>
                    </button>
                </div>
                <h2 class="profile-summary__name" id="display-name">Loading...</h2>
                <p class="profile-summary__id" id="display-student-id">-</p>
                <div class="profile-summary__status">
                    <span class="status-badge status-badge--active">Active Member</span>
                </div>
                <div class="profile-summary__meta">
                    <div class="profile-summary__meta-item">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Member since <span id="member-since">-</span></span>
                    </div>
                    <div class="profile-summary__meta-item">
                        <i class="fas fa-clock"></i>
                        <span>Last updated: <span id="last-updated">-</span></span>
                    </div>
                </div>
            </section>

            <!-- Profile Form -->
            <section class="profile-form-section">
                <form id="profile-form" class="profile-form">
                    <!-- Personal Information -->
                    <fieldset class="profile-form__fieldset">
                        <legend><i class="fas fa-user"></i> Personal Information</legend>
                        
                        <div class="profile-form__row">
                            <div class="profile-form__group">
                                <label for="first-name" class="profile-form__label">First Name</label>
                                <input type="text" id="first-name" name="first-name" class="profile-form__input" placeholder="First name">
                            </div>
                            <div class="profile-form__group">
                                <label for="last-name" class="profile-form__label">Last Name</label>
                                <input type="text" id="last-name" name="last-name" class="profile-form__input" placeholder="Last name">
                            </div>
                        </div>

                        <div class="profile-form__group">
                            <label for="email" class="profile-form__label">Email Address</label>
                            <input type="email" id="email" name="email" class="profile-form__input" placeholder="your.email@student.joust.ac.ke" readonly>
                            <small class="profile-form__help">Contact support to change your email address</small>
                        </div>

                        <div class="profile-form__row">
                            <div class="profile-form__group">
                                <label for="phone" class="profile-form__label">Phone Number</label>
                                <input type="tel" id="phone" name="phone" class="profile-form__input" placeholder="+254 XXX XXX XXX">
                            </div>
                            <div class="profile-form__group">
                                <label for="dob" class="profile-form__label">Date of Birth</label>
                                <input type="date" id="dob" name="dob" class="profile-form__input">
                            </div>
                        </div>

                        <div class="profile-form__row">
                            <div class="profile-form__group">
                                <label for="gender" class="profile-form__label">Gender</label>
                                <select id="gender" name="gender" class="profile-form__select">
                                    <option value="">Select Gender</option>
                                    <option value="female">Female</option>
                                    <option value="male">Male</option>
                                    <option value="other">Other</option>
                                    <option value="prefer-not">Prefer not to say</option>
                                </select>
                            </div>
                            <div class="profile-form__group">
                                <label for="student-id" class="profile-form__label">Student ID</label>
                                <input type="text" id="student-id" name="student-id" class="profile-form__input" readonly>
                            </div>
                        </div>
                    </fieldset>

                    <!-- Academic Information -->
                    <fieldset class="profile-form__fieldset">
                        <legend><i class="fas fa-graduation-cap"></i> Academic Information</legend>
                        
                        <div class="profile-form__group">
                            <label for="department" class="profile-form__label">Course/Department</label>
                            <select id="department" name="department" class="profile-form__select">
                                <option value="">Select Your Department</option>
                                <optgroup label="School of Education">
                                    <option value="bed-arts">B.Ed. Arts</option>
                                    <option value="bed-science">B.Ed. Science</option>
                                    <option value="bed-special">B.Ed. Special Needs & ECD</option>
                                </optgroup>
                                <optgroup label="School of Health Sciences">
                                    <option value="actuarial">Actuarial Science</option>
                                    <option value="public-health">Public Health</option>
                                    <option value="community-health">Community Health</option>
                                    <option value="nursing">Nursing</option>
                                </optgroup>
                                <optgroup label="School of Planning & Management">
                                    <option value="supply-chain">Supply Chain Management</option>
                                    <option value="construction">Construction Management</option>
                                    <option value="spatial-planning">Spatial Planning</option>
                                </optgroup>
                                <optgroup label="School of Engineering">
                                    <option value="civil-engineering">Civil Engineering</option>
                                    <option value="electrical">Electrical Engineering</option>
                                    <option value="mechanical">Mechanical Engineering</option>
                                </optgroup>
                                <optgroup label="School of Business">
                                    <option value="business-admin">Business Administration</option>
                                    <option value="accounting">Accounting & Finance</option>
                                    <option value="economics">Economics</option>
                                </optgroup>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="profile-form__row">
                            <div class="profile-form__group">
                                <label for="year-of-study" class="profile-form__label">Year of Study</label>
                                <select id="year-of-study" name="year-of-study" class="profile-form__select">
                                    <option value="">Select Year</option>
                                    <option value="1">Year 1</option>
                                    <option value="2">Year 2</option>
                                    <option value="3">Year 3</option>
                                    <option value="4">Year 4</option>
                                    <option value="5">Year 5+</option>
                                    <option value="postgraduate">Postgraduate</option>
                                </select>
                            </div>
                            <div class="profile-form__group">
                                <label for="admission-year" class="profile-form__label">Year of Admission</label>
                                <select id="admission-year" name="admission-year" class="profile-form__select">
                                    <option value="">Select Year</option>
                                    <option value="2025">2025</option>
                                    <option value="2024">2024</option>
                                    <option value="2023">2023</option>
                                    <option value="2022">2022</option>
                                    <option value="2021">2021</option>
                                    <option value="2020">2020</option>
                                </select>
                            </div>
                        </div>
                    </fieldset>

                    <!-- Emergency Contact -->
                    <fieldset class="profile-form__fieldset">
                        <legend><i class="fas fa-phone-alt"></i> Emergency Contact</legend>
                        
                        <div class="profile-form__group">
                            <label for="emergency-name" class="profile-form__label">Emergency Contact Name</label>
                            <input type="text" id="emergency-name" name="emergency-name" class="profile-form__input" placeholder="Full name of emergency contact">
                        </div>

                        <div class="profile-form__row">
                            <div class="profile-form__group">
                                <label for="emergency-phone" class="profile-form__label">Emergency Contact Phone</label>
                                <input type="tel" id="emergency-phone" name="emergency-phone" class="profile-form__input" placeholder="+254 XXX XXX XXX">
                            </div>
                            <div class="profile-form__group">
                                <label for="emergency-relation" class="profile-form__label">Relationship</label>
                                <select id="emergency-relation" name="emergency-relation" class="profile-form__select">
                                    <option value="">Select Relationship</option>
                                    <option value="parent">Parent/Guardian</option>
                                    <option value="sibling">Sibling</option>
                                    <option value="relative">Relative</option>
                                    <option value="friend">Friend</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                    </fieldset>

                    <!-- Notification Preferences -->
                    <fieldset class="profile-form__fieldset">
                        <legend><i class="fas fa-bell"></i> Notification Preferences</legend>
                        
                        <div class="profile-form__checkbox-group">
                            <label class="profile-form__checkbox-item">
                                <input type="checkbox" id="notify-email" name="notify-email" class="profile-form__checkbox" checked>
                                <span class="profile-form__checkbox-label">Receive email notifications</span>
                            </label>
                            <label class="profile-form__checkbox-item">
                                <input type="checkbox" id="notify-sms" name="notify-sms" class="profile-form__checkbox" checked>
                                <span class="profile-form__checkbox-label">Receive SMS notifications</span>
                            </label>
                            <label class="profile-form__checkbox-item">
                                <input type="checkbox" id="notify-events" name="notify-events" class="profile-form__checkbox" checked>
                                <span class="profile-form__checkbox-label">Get notified about events</span>
                            </label>
                            <label class="profile-form__checkbox-item">
                                <input type="checkbox" id="notify-contributions" name="notify-contributions" class="profile-form__checkbox" checked>
                                <span class="profile-form__checkbox-label">Receive contribution reminders</span>
                            </label>
                            <label class="profile-form__checkbox-item">
                                <input type="checkbox" id="notify-loans" name="notify-loans" class="profile-form__checkbox">
                                <span class="profile-form__checkbox-label">Receive loan updates</span>
                            </label>
                        </div>
                    </fieldset>

                    <!-- Form Actions -->
                    <div class="profile-form__actions">
                        <button type="submit" class="profile-form__submit">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                        <button type="button" class="profile-form__cancel" id="cancel-btn">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <!-- Shared Footer -->
    <div w3-include-html="../shared/footer.html"></div>
    
    <!-- W3 Schools HTML Includes Script -->
    <script>
        w3.includeHTML();
    </script>
    
    <!-- Profile Script -->
    <script src="../../src/scripts/pages/auth/profile.js"></script>
</body>

</html>
