<!DOCTYPE html>
<html lang="en">
<head>
    <!-- W3 Schools HTML Includes -->
    <script src="https://www.w3schools.com/lib/w3.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SWA Login Page - Access your Student Welfare Association account">
  <title>Login - Student Welfare Association | JOOUST</title>
  <!-- Main Styles -->
  <link rel="stylesheet" href="../../src/styles/main.css">
  <link rel="stylesheet" href="../../src/styles/original/header.css">
  <link rel="stylesheet" href="../../src/styles/pages/shared/navigation.css">
  <link rel="stylesheet" href="../../src/styles/original/footer.css">
  <!-- Login Page Styles -->
  <link rel="stylesheet" href="../../src/styles/pages/auth/login-page.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
  <!-- Shared Header -->
  <div w3-include-html="../shared/header.html"></div>

  <div class="login-page">
    <div class="login-card">
      <div class="login-card__header">
        <img src="../../images/Welfarelogo.webp" alt="SWA Logo" class="login-card__logo">
        <h1 class="login-card__title">Welcome Back</h1>
        <p class="login-card__subtitle">Login to access your SWA account</p>
      </div>
      
      <form action="index.php" method="post" class="login-form">
        <div class="login-form__group">
          <label for="username" class="login-form__label login-form__label--required">Username or Email</label>
          <input type="text" id="username" class="login-form__input" placeholder="Enter your username or email" required>
        </div>

        <div class="login-form__group">
          <label for="password" class="login-form__label login-form__label--required">Password</label>
          <input type="password" id="password" class="login-form__input" placeholder="Enter your password" required>
        </div>

        <label class="login-form__checkbox-group">
          <input type="checkbox" id="remember" class="login-form__checkbox">
          <span class="login-form__checkbox-label">Remember me</span>
        </label>

        <button type="submit" class="login-form__submit" onclick="alert('Login successful!')">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>

        <div class="login-form__link">
          <a href="forgot-password.html" class="login-form__link-anchor">
            <i class="fas fa-lock"></i> Forgot Password?
          </a>
        </div>
      </form>
    </div>
  </div>

    <!-- Shared Footer -->
    <div w3-include-html="../shared/footer.html"></div>
    <!-- Login Page Script -->
    <script src="../../src/scripts/pages/auth/login-page.js"></script>
    <!-- W3 Schools HTML Includes Script -->
    <script>
        w3.includeHTML();
    </script>
</body>
</html>
